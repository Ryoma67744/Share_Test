<script>
'use strict';

// ===========================================================================
// Minimal Supabase client — MRM library RPCs + the master-pw verifier.
// Mirrors index.html's SupabaseClient pattern.
// ===========================================================================
const SupabaseClient = (() => {
    let client = null;
    function _client() {
        if (client) return client;
        if (!window.SUPABASE_URL || !window.SUPABASE_ANON_KEY) return null;
        if (typeof supabase === 'undefined' || !supabase.createClient) return null;
        client = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY, { auth: { persistSession: false } });
        return client;
    }
    async function rpc(name, args) {
        const c = _client();
        if (!c) throw new Error('supabase_not_configured');
        const { data, error } = await c.rpc(name, args || {});
        if (error) throw error;
        return data;
    }
    return {
        configured() { return !!_client(); },
        verifyMasterPw(pw) { return rpc('verify_master_pw', { _pw: pw }); },
        listMrmLibrary(pw) { return rpc('list_mrm_library', { _master_pw: pw }); },
        upsertCompound(pw, name, tags, polarity, note, serialNo) {
            return rpc('upsert_compound', { _master_pw: pw, _name: name, _tags: tags || [], _polarity: polarity || null, _note: note || null, _serial_no: (serialNo == null ? null : serialNo) });
        },
        updateCompound(pw, id, name, tags, polarity, note, serialNo) {
            return rpc('update_compound', { _master_pw: pw, _id: id, _name: name, _tags: tags || [], _polarity: polarity || null, _note: note || null, _serial_no: (serialNo == null ? null : serialNo) });
        },
        deleteCompound(pw, id) { return rpc('delete_compound', { _master_pw: pw, _id: id }); },
        upsertTransition(pw, t) {
            return rpc('upsert_transition', {
                _master_pw: pw, _compound_id: t.compound_id,
                _precursor: t.precursor, _product: t.product, _ce: t.ce, _cv: t.cv,
                _role: t.role || null, _is_recommended: !!t.is_recommended,
                _intensity_note: t.intensity_note || null, _note: t.note || null,
            });
        },
        updateTransition(pw, id, t) {
            return rpc('update_transition', {
                _master_pw: pw, _id: id,
                _precursor: t.precursor, _product: t.product, _ce: t.ce, _cv: t.cv,
                _role: t.role || null, _is_recommended: !!t.is_recommended,
                _intensity_note: t.intensity_note || null, _note: t.note || null,
            });
        },
        deleteTransition(pw, id) { return rpc('delete_transition', { _master_pw: pw, _id: id }); },
        recordUsage(pw, u) {
            return rpc('record_usage', {
                _master_pw: pw, _transition_id: u.transition_id,
                _project_slug: u.project_slug || null, _project_name: u.project_name || null,
                _sample_name: u.sample_name || null, _source: u.source || 'manual',
                _sample_types: u.sample_types || [],
            });
        },
        getExpTemplate(pw) { return rpc('get_exp_template', { _master_pw: pw }); },
        setExpTemplate(pw, content) { return rpc('set_exp_template', { _master_pw: pw, _content: content }); },
        listMrmSets(pw) { return rpc('list_mrm_sets', { _master_pw: pw }); },
        upsertMrmSet(pw, s) {
            return rpc('upsert_mrm_set', {
                _master_pw: pw, _id: s.id || null, _name: s.name,
                _owner: s.owner || null, _description: s.description || null,
                _source_project_slug: s.source_project_slug || null,
                _items: s.items || [],
            });
        },
        deleteMrmSet(pw, id) { return rpc('delete_mrm_set', { _master_pw: pw, _id: id }); },
    };
})();

// ===========================================================================
// Master-mode gate — copied from index.html so behaviour is identical. The
// 12 h unlock state + cached master pw are shared via sessionStorage, so a
// user who unlocked on the project manager is not prompted again here.
// ===========================================================================
const MASTER_UNLOCK_KEY = 'desi:masterUnlocked';
const MASTER_UNLOCK_TTL_MS = 12 * 60 * 60 * 1000;
const MASTER_FALLBACK_HASH_HEX =
    'd453b548866689313ef7ee5b37cb869f342e5cd555c704c3298c1534d510cd6a';

async function sha256Hex(s) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(String(s)));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}
function isMasterUnlocked() {
    try {
        const raw = sessionStorage.getItem(MASTER_UNLOCK_KEY);
        if (!raw) return false;
        const p = JSON.parse(raw);
        return !!(p && p.expiresAt && Date.now() < p.expiresAt);
    } catch (e) { return false; }
}
function markMasterUnlocked(pw) {
    try {
        sessionStorage.setItem(MASTER_UNLOCK_KEY, JSON.stringify({
            unlockedAt: Date.now(), expiresAt: Date.now() + MASTER_UNLOCK_TTL_MS,
        }));
    } catch (e) {}
    if (pw) {
        try {
            sessionStorage.setItem('desi:masterPw', JSON.stringify({
                pw, expiresAt: Date.now() + MASTER_UNLOCK_TTL_MS,
            }));
        } catch (e) {}
    }
}
function _readCachedMasterPw() {
    try {
        const raw = sessionStorage.getItem('desi:masterPw');
        if (!raw) return '';
        const p = JSON.parse(raw);
        return (p && p.expiresAt > Date.now()) ? (p.pw || '') : '';
    } catch (e) { return ''; }
}
async function tryServerUnlock(pw) {
    if (!SupabaseClient.configured()) return { ok: false, transient: true };
    try {
        const ok = await SupabaseClient.verifyMasterPw(pw);
        return ok === true ? { ok: true } : { ok: false, transient: false };
    } catch (e) {
        console.warn('verify_master_pw failed (will try local hash):', e);
        return { ok: false, transient: true };
    }
}
async function tryLocalUnlock(pw) {
    try { return (await sha256Hex(pw)) === MASTER_FALLBACK_HASH_HEX; }
    catch (e) { return false; }
}
function openMasterUnlockModal() {
    const html = `
        <h2>パスワードを入力してください</h2>
        <p style="font-size:12px;color:#475569;margin-top:4px;">MRM管理に入るには admin password が必要です。</p>
        <form class="row">
          <label>Password <input type="password" name="pw" autocomplete="current-password" required></label>
          <p class="err" data-err></p>
          <div class="actions"><button type="submit" class="btn primary" data-modal-ok>Unlock</button></div>
        </form>`;
    return new Promise((resolve) => {
        const host = document.getElementById('modal-host');
        const back = document.createElement('div'); back.className = 'modal-backdrop';
        const card = document.createElement('div'); card.className = 'modal-card'; card.innerHTML = html;
        back.appendChild(card); host.appendChild(back);
        back.addEventListener('click', (e) => { if (e.target === back) e.stopPropagation(); });
        const errEl = card.querySelector('[data-err]');
        const submit = card.querySelector('[data-modal-ok]');
        const inp = card.querySelector('[name="pw"]');
        setTimeout(() => inp.focus(), 30);
        const tryUnlock = async () => {
            const pw = (inp.value || '').trim();
            if (!pw) { errEl.textContent = 'パスワードを入力してください'; return; }
            submit.disabled = true; submit.textContent = '確認中…'; errEl.textContent = '';
            const server = await tryServerUnlock(pw);
            let ok = server.ok;
            if (!ok && server.transient) ok = await tryLocalUnlock(pw);
            submit.disabled = false; submit.textContent = 'Unlock';
            if (ok) { markMasterUnlocked(pw); back.remove(); resolve(true); }
            else { errEl.textContent = 'パスワードが違います'; inp.select(); }
        };
        card.querySelector('form').addEventListener('submit', (e) => { e.preventDefault(); tryUnlock(); });
    });
}
async function requireMasterUnlock() {
    if (isMasterUnlocked()) return true;
    return openMasterUnlockModal();
}

// ===========================================================================
// Generic modal (mirrors index.html's openModal: [data-modal-ok] triggers
// card._collect(); a null/false return keeps the modal open for validation).
// ===========================================================================
function openModal(html) {
    return new Promise((resolve) => {
        const host = document.getElementById('modal-host');
        const back = document.createElement('div'); back.className = 'modal-backdrop';
        const card = document.createElement('div'); card.className = 'modal-card'; card.innerHTML = html;
        back.appendChild(card); host.appendChild(back);
        const close = (val) => { back.remove(); resolve(val); };
        card.querySelectorAll('[data-modal-cancel]').forEach(b => b.addEventListener('click', () => close(null)));
        back.addEventListener('click', (e) => { if (e.target === back) close(null); });
        card._close = close;
        const submit = card.querySelector('[data-modal-ok]');
        if (submit) submit.addEventListener('click', () => {
            const result = card._collect ? card._collect() : true;
            if (result === false || result == null) return;
            close(result);
        });
        const form = card.querySelector('form');
        if (form) form.addEventListener('submit', (e) => { e.preventDefault(); if (submit) submit.click(); });
        const focusEl = card.querySelector('input, select, textarea');
        if (focusEl) setTimeout(() => focusEl.focus(), 30);
        openModal._card = card;
    });
}

// ===========================================================================
// Library state + rendering
// ===========================================================================
const safe = (s) => String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
const UNTAGGED = '(未分類)';

let library = [];        // [{id,serial_no,name,tags[],polarity,note,transitions:[{...,usages:[...]}]}]
let mrmSets = [];        // ② [{id,name,owner,description,source_project_slug,items:[{transition_id,name,precursor,product,ce,cv,...}]}]
let searchText = '';
let filterPolarity = '';          // '', '+', '-'
let selectedTags = new Set();     // 分類フィルタ (OR)
let selectedSampleTypes = new Set(); // サンプル種フィルタ (OR)
let selectedTransitions = new Set(); // .exp 出力に含める transition id

function parseTags(s) {
    const out = [];
    for (const raw of String(s || '').split(/[,、\s]+/)) {
        const t = raw.trim();
        if (t && !out.includes(t)) out.push(t);
    }
    return out;
}
function fmtNum(n) { return (n == null || n === '') ? '—' : String(n); }

// Trigger a browser download of generated text (copied from viewer/index.html).
function downloadAsFile(blob, fname) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = fname;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 1000);
}
function readFileAsText(file) {
    return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(r.result);
        r.onerror = () => reject(r.error);
        r.readAsText(file);
    });
}
function findCompound(id) { return library.find(c => c.id === id) || null; }
function findTransition(tid) {
    for (const c of library) { const t = (c.transitions || []).find(x => x.id === tid); if (t) return { compound: c, transition: t }; }
    return null;
}

async function loadLibrary() {
    const host = document.getElementById('lib');
    if (!SupabaseClient.configured()) {
        host.innerHTML = '<div class="card p-6 text-center text-sm text-red-600">Supabase が未設定です (SUPABASE_URL / ANON_KEY)。</div>';
        return;
    }
    const pw = _readCachedMasterPw();
    if (!pw) { host.innerHTML = '<div class="card p-6 text-center text-sm text-gray-500">認証が切れました。再読込してください。</div>'; return; }
    host.innerHTML = '<p class="text-sm text-gray-500 px-1">読み込み中…</p>';
    try {
        const rows = await SupabaseClient.listMrmLibrary(pw);
        library = Array.isArray(rows) ? rows : [];
        renderLibrary();
        await loadSets();   // ② method sets (non-fatal if it fails)
    } catch (e) {
        console.warn('list_mrm_library failed', e);
        const msg = String((e && (e.message || e.details)) || '');
        host.innerHTML = '<div class="card p-6 text-center text-sm text-red-600">取得に失敗しました'
            + (/unauthorized|28000/i.test(msg) ? ' (master password 違い?)' : ': ' + safe(msg)) + '</div>';
    }
}

function usagesHtml(tr) {
    const us = tr.usages || [];
    if (!us.length) return '<div class="usage-list muted">使用履歴なし</div>';
    const items = us.map(u => {
        const proj = u.project_slug
            ? '<a data-action="open-usage" data-slug="' + safe(u.project_slug) + '">' + safe(u.project_name || u.project_slug) + ' ↗</a>'
            : '<span>' + safe(u.project_name || '(プロジェクト名なし)') + '</span>';
        const stxt = (u.sample_types && u.sample_types.length) ? u.sample_types.join(', ') : (u.sample_name || '');
        const sample = stxt ? ' / ' + safe(stxt) : '';
        const date = u.created_at ? String(u.created_at).slice(0, 10) : '';
        return '<li>' + proj + sample + '<span class="src-badge">' + safe(u.source || '') + '</span>'

// --- consolidation by serial_no -------------------------------------------
// Compounds sharing a serial_no are ONE logical compound (handles name drift
// like GABA / POS_GABA). Build "units" keyed by serial_no (null = own unit).
function libraryUnits() {
    const map = new Map(); const units = [];
    for (const c of (library || [])) {
        const key = (c.serial_no != null) ? ('S' + c.serial_no) : ('C' + c.id);
        let u = map.get(key);
        if (!u) { u = { key, serial_no: (c.serial_no != null ? c.serial_no : null), members: [] }; map.set(key, u); units.push(u); }
        u.members.push(c);
    }
    for (const u of units) {
        const tags = []; const pols = new Set(); let nTr = 0;
        for (const c of u.members) {
            for (const t of (c.tags || [])) if (!tags.includes(t)) tags.push(t);
            if (c.polarity) pols.add(c.polarity);
            nTr += (c.transitions || []).length;
        }
        u.tags = tags; u.polarities = pols; u.nTr = nTr;
    }
    units.sort((a, b) => {
        if (a.serial_no != null && b.serial_no != null) return a.serial_no - b.serial_no;
        if (a.serial_no != null) return -1;
        if (b.serial_no != null) return 1;
        return (a.members[0].name || '').localeCompare(b.members[0].name || '', 'ja');
    });
    return units;
}

function availableTags() {
    const s = new Set();
    for (const c of (library || [])) for (const t of (c.tags || [])) if (t) s.add(t);
    return Array.from(s).sort((a, b) => a.localeCompare(b, 'ja'));
}
function availableSampleTypes() {
    const s = new Set();
    for (const c of (library || []))
        for (const tr of (c.transitions || []))
            for (const u of (tr.usages || []))
                for (const st of (u.sample_types || [])) if (st) s.add(st);
    return Array.from(s).sort((a, b) => a.localeCompare(b, 'ja'));
}
function unitSampleTypes(u) {
    const s = new Set();
    for (const c of u.members)
        for (const tr of (c.transitions || []))
            for (const us of (tr.usages || []))
                for (const st of (us.sample_types || [])) if (st) s.add(st);
    return s;
}

// Category-AND, within-category-OR. Unit matches if ANY member satisfies.
function unitMatches(u) {
    const q = (searchText || '').trim().toLowerCase();
    if (q) {
        let hit = false;
        for (const c of u.members) {
            if ((c.name || '').toLowerCase().includes(q)) { hit = true; break; }
            if ((c.tags || []).some(t => (t || '').toLowerCase().includes(q))) { hit = true; break; }
            for (const tr of (c.transitions || [])) {
                for (const us of (tr.usages || [])) {
                    if ((us.project_name || '').toLowerCase().includes(q)) { hit = true; break; }
                    if ((us.sample_name || '').toLowerCase().includes(q)) { hit = true; break; }
                    if ((us.sample_types || []).some(st => (st || '').toLowerCase().includes(q))) { hit = true; break; }
                }
                if (hit) break;
            }
            if (hit) break;
        }
        if (!hit) return false;
    }
    if (filterPolarity && !u.polarities.has(filterPolarity)) return false;
    if (selectedTags.size) {
        let any = false; for (const t of u.tags) if (selectedTags.has(t)) { any = true; break; }
        if (!any) return false;
    }
    if (selectedSampleTypes.size) {
        const sts = unitSampleTypes(u);
        let any = false; for (const st of selectedSampleTypes) if (sts.has(st)) { any = true; break; }
        if (!any) return false;
    }
    return true;
}

function renderFilterBar() {
    const bar = document.getElementById('filter-bar');
    if (!bar) return;
    const tags = availableTags();
    const stypes = availableSampleTypes();
    const polBtn = (val, label) => '<span class="fchip' + (filterPolarity === val ? ' on' : '') + '" data-filter="pol" data-val="' + safe(val) + '">' + safe(label) + '</span>';
    const tagBtn = (t) => '<span class="fchip' + (selectedTags.has(t) ? ' on' : '') + '" data-filter="tag" data-val="' + safe(t) + '">' + safe(t) + '</span>';
    const stBtn = (t) => '<span class="fchip' + (selectedSampleTypes.has(t) ? ' on' : '') + '" data-filter="stype" data-val="' + safe(t) + '">' + safe(t) + '</span>';
    let html = '<div class="filter-group"><span class="flabel">極性</span>' + polBtn('', 'All') + polBtn('+', '+') + polBtn('-', '−') + '</div>';
    if (tags.length) html += '<div class="filter-group"><span class="flabel">分類</span>' + tags.map(tagBtn).join('') + '</div>';
    if (stypes.length) html += '<div class="filter-group"><span class="flabel">サンプル種</span>' + stypes.map(stBtn).join('') + '</div>';

}

function unitHtml(u) {
    const serialBadge = (u.serial_no != null) ? '<span class="serial-badge">#' + safe(u.serial_no) + '</span>' : '';
    const tagChips = (u.tags || []).map(t => '<span class="chip">' + safe(t) + '</span>').join('') || '<span class="chip gray">未分類</span>';
    const countLbl = '<span class="text-xs muted">' + u.nTr + ' transition' + (u.nTr === 1 ? '' : 's')
        + (u.members.length > 1 ? ' ・ ' + u.members.length + ' 名称' : '') + '</span>';
    // Single-name compound: surface the action buttons in the (always-visible)
    // summary so editing/renaming needs no expand. Clicks on buttons inside a
    // <summary> are stopped from toggling the <details> in bindLibraryEvents.
    if (u.members.length === 1) {
        const c = u.members[0];
        const pol = c.polarity ? '<span class="chip pol">' + safe(c.polarity) + '</span>' : '';
        // Quick-select: a compound with exactly one transition can be selected
        // for .exp straight from the (always-visible) summary, without expanding
        // the detail row. Shares data-tid with the level-2 .tr-select so the two
        // stay in sync (see bindLibraryEvents).
        const quickSel = (Array.isArray(c.transitions) && c.transitions.length === 1)
            ? '<input type="checkbox" class="tr-quick-select" data-tid="' + safe(c.transitions[0].id) + '" title=".exp 出力に含める (1 transition)" style="margin-right:6px;vertical-align:middle;cursor:pointer;"' + (selectedTransitions.has(c.transitions[0].id) ? ' checked' : '') + '>'
            : '';
        return ''
            + '<details class="cpd">'
            +   '<summary>'
            +     quickSel
            +     serialBadge
            +     '<span class="font-semibold">' + safe(c.name) + '</span>'
            +     tagChips + pol + countLbl
            +     '<span style="flex:1"></span>'
            +     compoundActions(c)
            +   '</summary>'
            +   '<div class="cpd-body">' + compoundBody(c) + '</div>'
            + '</details>';
    }
    // Consolidated unit (>=2 names sharing a serial_no): auto-expand, per-member
    // action buttons in the body.
    const names = u.members.map(m => safe(m.name)).join(' / ');
    const pol = Array.from(u.polarities).map(p => '<span class="chip pol">' + safe(p) + '</span>').join('');
    return ''
        + '<details class="cpd" open>'
        +   '<summary>'
        +     serialBadge
        +     '<span class="font-semibold">' + names + '</span>'
        +     tagChips + pol + countLbl
        +   '</summary>'
        +   '<div class="cpd-body">' + u.members.map(memberHtml).join('') + '</div>'
        + '</details>';
}

function renderLibrary() {
    renderFilterBar();
    renderSelectedPanel();
    const host = document.getElementById('lib');
    const units = libraryUnits().filter(unitMatches);
    if (!units.length) {
        host.innerHTML = '<div class="card p-6 text-center text-sm text-gray-500">'
            + (library.length ? '条件に一致する化合物がありません。' : 'まだ登録がありません。「+ 化合物」で追加するか、結果画面の Method 表から登録してください。')
            + '</div>';
        return;
    }
    // Group by tag — a unit with multiple tags appears under each.
    const groups = new Map();
    for (const u of units) {
        const tags = (u.tags && u.tags.length) ? u.tags : [UNTAGGED];
        for (const t of tags) { if (!groups.has(t)) groups.set(t, []); groups.get(t).push(u); }
    }
    const tagNames = Array.from(groups.keys()).sort((a, b) => {
        if (a === UNTAGGED) return 1; if (b === UNTAGGED) return -1;
        return a.localeCompare(b, 'ja');
    });
    host.innerHTML = tagNames.map(t => {
        const list = groups.get(t).map(unitHtml).join('');
        return '<div class="tag-group"><h2>' + safe(t) + ' <span class="muted" style="font-weight:400;">(' + groups.get(t).length + ')</span></h2>' + list + '</div>';
    }).join('');
}

// ===========================================================================
// ③ Excel (.xlsx/.xls) MRM list import. Parses sheets whose layout matches the
// lab's method lists: one or more category blocks (e.g. "Amino acid",
// "13C6-Glucose") each with a header row "CompoundName | Precursor | Product |
// CV | CE" followed by compound rows. Multiple blocks may be stacked
// vertically and laid out in several columns ("lanes") on the same sheet, so we
// scan the whole sheet for every CompoundName header. Columns are matched by
// HEADER NAME (so the CV-before-CE order is absorbed), the category title above
// each block becomes a tag, and polarity is taken from a +/− marker near the
// title or inferred from the compound name (NEG/POS).
// ===========================================================================
const _normHeader = (v) => String(v == null ? '' : v).trim().toLowerCase().replace(/\s+/g, '');
const _isNum = (v) => { if (v == null || v === '') return false; return Number.isFinite(Number(v)); };
const _toNum = (v) => { if (v == null || v === '') return null; const n = Number(v); return Number.isFinite(n) ? n : null; };

// Map a header cell to one of our fields, or null when it is not a header.
function _mrmField(h) {
    const n = _normHeader(h);
    if (!n) return null;
    if (n === 'compoundname' || n === 'compound' || n === 'name' || n === '化合物名' || n === '化合物') return 'name';
    if (n === 'precursor' || n === 'precursormz' || n === 'q1' || n === 'parent' || n.startsWith('precursor')) return 'precursor';
    if (n === 'product' || n === 'productmz' || n === 'q3' || n === 'fragment' || n.startsWith('product') || n.startsWith('fragment')) return 'product';
    if (n === 'cv' || n === 'conevoltage' || n === 'cone') return 'cv';
    if (n === 'ce' || n === 'collisionenergy' || n === 'collision') return 'ce';
    return null;
}

// Infer ion-mode polarity from tokens in a compound name (e.g. "Lactate-NEG",
// "POS_Acetylcholine"). Returns '+', '-' or null.
function inferPolarityFromName(name) {
    const toks = String(name || '').toLowerCase().split(/[^a-z0-9]+/);
    if (toks.includes('neg')) return '-';
    if (toks.includes('pos')) return '+';
    return null;
}

// Look for a lone +/− marker cell on the header row or the title row just above,
// scanning a few columns left of the block (markers often sit in column A).
function _detectBlockPolarity(aoa, headerRow, c0, lastCol) {
    for (const rr of [headerRow, headerRow - 1]) {
        if (rr < 0) continue;
        const arow = aoa[rr] || [];
        for (let cc = Math.max(0, c0 - 3); cc <= lastCol; cc++) {
            const s = arow[cc] == null ? '' : String(arow[cc]).trim();
            if (s === '+' || s === '＋') return '+';
            if (s === '-' || s === '−' || s === '－' || s === 'ー') return '-';
        }
    }
    return null;
}

// Parse one sheet (array-of-arrays) into category blocks.
function _parseSheetBlocks(aoa, sheetName) {
    const blocks = [];
    for (let r = 0; r < aoa.length; r++) {
        const row = aoa[r] || [];
        for (let c = 0; c < row.length; c++) {
            if (_mrmField(row[c]) !== 'name') continue;
            // Map contiguous header columns from this CompoundName cell rightward.
            const cols = {};
            let lastCol = c;
            for (let cc = c; cc < row.length; cc++) {
                const f = _mrmField(row[cc]);
                if (!f) break;
                if (!(f in cols)) cols[f] = cc;
                lastCol = cc;
            }
            if (!('name' in cols) || !('precursor' in cols)) continue;
            // Category title: nearest non-empty text cell above the block (not a
            // number, header or polarity marker).
            let category = '';
            for (let rr = r - 1; rr >= 0 && rr >= r - 3 && !category; rr--) {
                const arow = aoa[rr] || [];
                for (let cc = Math.max(0, c - 1); cc <= lastCol; cc++) {
                    const s = arow[cc] == null ? '' : String(arow[cc]).trim();
                    if (s === '' || _isNum(arow[cc]) || _mrmField(arow[cc]) !== null) continue;
                    if (/^[+\-−＋－ー]$/.test(s)) continue;
                    category = s; break;
                }
            }
            const blockPolarity = _detectBlockPolarity(aoa, r, c, lastCol);
            // Data rows below the header until the name cell is empty or a new
            // header begins.
            const compounds = [];
            const byName = new Map();
            for (let rr = r + 1; rr < aoa.length; rr++) {
                const drow = aoa[rr] || [];
                const nameVal = drow[cols.name];
                if (_mrmField(nameVal) === 'name') break;        // next block's header
                const nameStr = nameVal == null ? '' : String(nameVal).trim();
                if (nameStr === '') break;                       // blank row ends the block
                const prec = _toNum(drow[cols.precursor]);
                const prod = ('product' in cols) ? _toNum(drow[cols.product]) : null;
                const cv = ('cv' in cols) ? _toNum(drow[cols.cv]) : null;
                const ce = ('ce' in cols) ? _toNum(drow[cols.ce]) : null;
                if (prec == null && prod == null) continue;      // skip rows without m/z (e.g. stray titles)
                const tr = { precursor: prec, product: prod, cv: cv, ce: ce };
                if (byName.has(nameStr)) byName.get(nameStr).transitions.push(tr);
                else { const obj = { name: nameStr, transitions: [tr] }; byName.set(nameStr, obj); compounds.push(obj); }
            }
            if (compounds.length) blocks.push({ sheet: sheetName, category: category, polarity: blockPolarity, compounds });
        }
    }
    return blocks;
}

function parseMrmWorkbook(buf) {
    if (typeof XLSX === 'undefined') throw new Error('SheetJS (XLSX) が読み込まれていません');
    const wb = XLSX.read(new Uint8Array(buf), { type: 'array' });
    const blocks = [];
    for (const sheetName of wb.SheetNames) {
        const sheet = wb.Sheets[sheetName];
        if (!sheet || !sheet['!ref']) continue;
        const aoa = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: true, defval: null });
        for (const b of _parseSheetBlocks(aoa, sheetName)) blocks.push(b);
    }
    return blocks;
}

async function importMrmFromExcel(file) {
    let blocks;
    try {
        const buf = await file.arrayBuffer();
        blocks = parseMrmWorkbook(buf);
    } catch (e) { reportError(e, 'Excel の解析'); return; }
    if (!blocks.length) {
        alert('「CompoundName」ヘッダを含むブロックが見つかりませんでした。ヘッダ行に CompoundName / Precursor / Product / CV / CE があるか確認してください。');
        return;
    }
    const groups = await openImportPreviewModal(blocks);
    if (!groups) return;     // cancelled
    await runMrmImport(groups);
}

function openImportPreviewModal(blocks) {
    const totalC = blocks.reduce((a, b) => a + b.compounds.length, 0);
    const totalT = blocks.reduce((a, b) => a + b.compounds.reduce((x, c) => x + c.transitions.length, 0), 0);
    const rows = blocks.map((b, i) => {
        const tcount = b.compounds.reduce((x, c) => x + c.transitions.length, 0);
        const pol = b.polarity || '';
        const sample = b.compounds.slice(0, 3).map(c => safe(c.name)).join(', ') + (b.compounds.length > 3 ? ' …' : '');
        return '<tr>'
            + '<td style="text-align:center;"><input type="checkbox" data-imp-include data-i="' + i + '" checked></td>'
            + '<td><input type="text" data-imp-tag data-i="' + i + '" value="' + safe(b.category) + '" style="width:100%;padding:2px 4px;border:1px solid #cbd5e1;border-radius:3px;"></td>'
            + '<td><select data-imp-pol data-i="' + i + '" style="padding:2px 4px;border:1px solid #cbd5e1;border-radius:3px;">'
            +   '<option value=""' + (pol === '' ? ' selected' : '') + '>— (名前から推定)</option>'
            +   '<option value="+"' + (pol === '+' ? ' selected' : '') + '>+</option>'
            +   '<option value="-"' + (pol === '-' ? ' selected' : '') + '>−</option>'
            + '</select></td>'
            + '<td style="text-align:right;">' + b.compounds.length + '</td>'
            + '<td style="text-align:right;">' + tcount + '</td>'
            + '<td class="muted" style="font-size:11px;">' + sample + '</td>'
            + '</tr>';
    }).join('');
    const html = `
        <h2>Excel から MRM を取り込み</h2>
        <p class="muted" style="font-size:12px;margin:0 0 8px;">${blocks.length} ブロック / ${totalC} 化合物 / ${totalT} トランジションを検出しました。カテゴリはタグとして登録されます。極性「—」は化合物名 (NEG/POS) から推定します。既存の同名化合物・同一トランジションは上書き/スキップされます。</p>
        <div style="max-height:50vh;overflow:auto;border:1px solid #e5e7eb;border-radius:6px;">
        <table style="width:100%;border-collapse:collapse;font-size:13px;">
          <thead><tr style="text-align:left;background:#f8fafc;position:sticky;top:0;">
            <th style="padding:4px 6px;">取込</th><th style="padding:4px 6px;">タグ(カテゴリ)</th><th style="padding:4px 6px;">極性</th>
            <th style="padding:4px 6px;text-align:right;">化合物</th><th style="padding:4px 6px;text-align:right;">遷移</th><th style="padding:4px 6px;">例</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
        </div>
        <p class="err" data-err></p>
        <div class="actions">
          <button type="button" class="btn" data-modal-cancel>Cancel</button>
          <button type="button" class="btn primary" data-modal-ok>取り込み実行</button>
        </div>`;
    const p = openModal(html);
    const card = openModal._card;
    card._collect = () => {
        const out = [];
        for (let i = 0; i < blocks.length; i++) {
            const inc = card.querySelector('[data-imp-include][data-i="' + i + '"]');
            if (!inc || !inc.checked) continue;
            const tag = (card.querySelector('[data-imp-tag][data-i="' + i + '"]').value || '').trim();
            const polDefault = card.querySelector('[data-imp-pol][data-i="' + i + '"]').value || '';
            const compounds = blocks[i].compounds.map(c => ({
                name: c.name,
                polarity: polDefault !== '' ? polDefault : (inferPolarityFromName(c.name) || null),
                transitions: c.transitions,
            }));
            out.push({ tag: tag, compounds: compounds });
        }
        if (!out.length) { card.querySelector('[data-err]').textContent = '取り込むブロックが選択されていません'; return null; }
        return out;
    };
    return p;
}

async function runMrmImport(groups) {
    const pw = _readCachedMasterPw();
    const total = groups.reduce((a, g) => a + g.compounds.length, 0);
    let done = 0, okC = 0, okT = 0, fail = 0;
    openModal('<h2>取り込み中…</h2><p class="muted" data-prog>0 / ' + total + '</p>');
    const progCard = openModal._card;
    const progEl = progCard && progCard.querySelector('[data-prog]');
    for (const g of groups) {
        const tags = g.tag ? [g.tag] : [];
        for (const c of g.compounds) {
            try {
                const id = await SupabaseClient.upsertCompound(pw, c.name, tags, c.polarity, null, null);
                okC++;
                for (const tr of c.transitions) {
                    try {
                        await SupabaseClient.upsertTransition(pw, {
                            compound_id: id, precursor: tr.precursor, product: tr.product, ce: tr.ce, cv: tr.cv,
                        });
                        okT++;
                    } catch (e) { fail++; console.warn('transition import failed', c.name, tr, e); }
                }
            } catch (e) { fail++; console.warn('compound import failed', c.name, e); }
            done++;
            if (progEl) progEl.textContent = done + ' / ' + total;
        }
    }
    if (progCard && progCard._close) progCard._close(true);
    await loadLibrary();
    alert('取り込み完了: 化合物 ' + okC + ' 件 / トランジション ' + okT + ' 件'
        + (fail ? '（失敗 ' + fail + ' 件、詳細はブラウザのコンソール）' : ''));
}

function _expKey(line) { const i = line.indexOf(','); return i < 0 ? line : line.slice(0, i); }
function _expFirstValue(lines, key, dflt) {
    for (const ln of lines) { if (_expKey(ln) === key) { const i = ln.indexOf(','); return i < 0 ? '' : ln.slice(i + 1); } }
    return dflt;
}
function _expReplaceScalar(lines, key, value) {
    return lines.map(ln => (_expKey(ln) === key ? key + ',' + value : ln));
}
function _expFmt(x) {
    if (x == null || x === '') return '';
    const n = Number(x);
    return Number.isFinite(n) ? String(n) : String(x);
}
// Per-entry key membership for THIS fixed instrument's .exp (suffix = index).
function _isSirEntryKey(k) {
    return /^SIRMass\d+$/.test(k) || /^SIRMass_2_\d+$/.test(k) || /^SIRAutoDwell\d+$/.test(k)
        || /^SIRDwellTime\d+$/.test(k) || /^SIRDelay\d+$/.test(k) || /^UseAsLockMass\d+$/.test(k)
        || /^UseSampleList\d+$/.test(k) || /^UseSampleList_2\d+$/.test(k);
}
function _isChannelEntryKey(k) {
    return /^UseSLMassesP_\d+$/.test(k) || /^UseSLMassesD_\d+$/.test(k) || /^Mass\(amu\)_\d+$/.test(k)
        || /^Mass2\(amu\)_\d+$/.test(k) || /^AutoDwell_\d+$/.test(k) || /^Dwell\(s\)_\d+$/.test(k)
        || /^ConeVoltage\(V\)_\d+$/.test(k) || /^CollisionEnergy\(eV\)_\d+$/.test(k) || /^InterChannelDelay\(s\)_\d+$/.test(k)
        || /^CompoundName_\d+$/.test(k) || /^CompoundFormula_\d+$/.test(k) || /^CompoundComment_\d+$/.test(k);
}

function buildExp(templateText, rows) {
    if (!rows.length) throw new Error('トランジションが選択されていません');
    const crlf = /\r\n/.test(templateText);
    const lines = templateText.replace(/\r\n/g, '\n').split('\n');
    const n = rows.length;
    // Constant per-entry values are taken from the template's first entry.
    const d = {
        SIRAutoDwell: _expFirstValue(lines, 'SIRAutoDwell1', '0'),
        SIRDwellTime: _expFirstValue(lines, 'SIRDwellTime1', '0.0100'),
        SIRDelay: _expFirstValue(lines, 'SIRDelay1', '0.0037'),
        UseAsLockMass: _expFirstValue(lines, 'UseAsLockMass1', '0'),
        UseSampleList: _expFirstValue(lines, 'UseSampleList1', '0'),
        UseSampleList_2: _expFirstValue(lines, 'UseSampleList_21', '0'),
        UseSLMassesP: _expFirstValue(lines, 'UseSLMassesP_1', '0'),
        UseSLMassesD: _expFirstValue(lines, 'UseSLMassesD_1', '0'),
        AutoDwell: _expFirstValue(lines, 'AutoDwell_1', '0'),
        Dwell: _expFirstValue(lines, 'Dwell(s)_1', '0.0100'),
        InterChannelDelay: _expFirstValue(lines, 'InterChannelDelay(s)_1', '0.0037'),
    };
    const sirBlock = [];
    rows.forEach((r, idx) => {
        const i = idx + 1;
        sirBlock.push('SIRMass' + i + ',' + _expFmt(r.precursor));
        sirBlock.push('SIRMass_2_' + i + ',' + _expFmt(r.product));
        sirBlock.push('SIRAutoDwell' + i + ',' + d.SIRAutoDwell);
        sirBlock.push('SIRDwellTime' + i + ',' + d.SIRDwellTime);
        sirBlock.push('SIRDelay' + i + ',' + d.SIRDelay);
        sirBlock.push('UseAsLockMass' + i + ',' + d.UseAsLockMass);
        sirBlock.push('UseSampleList' + i + ',' + d.UseSampleList);
        sirBlock.push('UseSampleList_2' + i + ',' + d.UseSampleList_2);
    });
    const chBlock = [];
    rows.forEach((r, idx) => {
        const i = idx + 1;
        chBlock.push('UseSLMassesP_' + i + ',' + d.UseSLMassesP);
        chBlock.push('UseSLMassesD_' + i + ',' + d.UseSLMassesD);
        chBlock.push('Mass(amu)_' + i + ',' + _expFmt(r.precursor));
        chBlock.push('Mass2(amu)_' + i + ',' + _expFmt(r.product));
        chBlock.push('AutoDwell_' + i + ',' + d.AutoDwell);
        chBlock.push('Dwell(s)_' + i + ',' + d.Dwell);
        chBlock.push('ConeVoltage(V)_' + i + ',' + _expFmt(r.cv));
        chBlock.push('CollisionEnergy(eV)_' + i + ',' + _expFmt(r.ce));
        chBlock.push('InterChannelDelay(s)_' + i + ',' + d.InterChannelDelay);
        chBlock.push('CompoundName_' + i + ',' + (r.name || ('MRM_' + _expFmt(r.precursor) + '_' + _expFmt(r.product))));
        chBlock.push('');  // preserve the blank line after CompoundName
        chBlock.push('CompoundFormula_' + i + ',');
        chBlock.push('CompoundComment_' + i + ',');
    });
    // Span-replace the SIR block (at NumSIRMasses) and the MRM channel block
    // (at the first channel line), preserving file order + all other settings.
    let out = [];
    let i = 0, sirDone = false, chDone = false;
    while (i < lines.length) {
        const ln = lines[i];
        const key = _expKey(ln);
        if (!sirDone && key === 'NumSIRMasses') {
            out.push('NumSIRMasses,' + n);
            i++;
            while (i < lines.length && (_isSirEntryKey(_expKey(lines[i])) || lines[i].trim() === '')) i++;
            for (const b of sirBlock) out.push(b);
            sirDone = true;
            continue;
        }
        if (!chDone && _isChannelEntryKey(key)) {
            while (i < lines.length && (_isChannelEntryKey(_expKey(lines[i])) || lines[i].trim() === '')) i++;
            for (const b of chBlock) out.push(b);
            chDone = true;
            continue;
        }
        out.push(ln);
        i++;
    }
    out = _expReplaceScalar(out, 'NoOfChannels', String(n));
    const dwell = parseFloat(d.Dwell) || 0;
    const delay = parseFloat(d.InterChannelDelay) || 0;
    const tmplScan = _expFirstValue(out, 'FunctionScanTime(sec)', '0.1960');
    const dec = (/\.\d+/.test(tmplScan)) ? tmplScan.split('.')[1].length : 4;
    out = _expReplaceScalar(out, 'FunctionScanTime(sec)', (n * (dwell + delay)).toFixed(dec));

    let text = out.join('\n');
    if (!text.endsWith('\n')) text += '\n';
    if (crlf) text = text.replace(/\n/g, '\r\n');
    return text;
}

// Shared .exp build + download for a list of {name,precursor,product,cv,ce}.
async function exportExpRows(rows, baseName) {
    if (!rows || !rows.length) { alert('出力するトランジションがありません'); return; }
    const pw = _readCachedMasterPw();
    if (!pw) { alert('認証が切れました。再読込してください。'); return; }
    let template;
    try { template = await SupabaseClient.getExpTemplate(pw); }
    catch (e) { reportError(e, 'テンプレ取得'); return; }
    if (!template || !template.trim()) {
        alert('テンプレートが未設定です。「テンプレ設定」で .exp テンプレートを保存してください。');
        return;
    }
    let text;
    try { text = buildExp(template, rows); }
    catch (e) { alert('.exp 生成に失敗しました: ' + (e.message || e)); console.warn(e); return; }
    const stamp = new Date().toISOString().slice(0, 10).replace(/-/g, '');
    const base = (baseName || 'DESI_MRM').replace(/[^\w\-]+/g, '_') || 'DESI_MRM';
    downloadAsFile(new Blob([text], { type: 'text/plain' }), base + '_' + stamp + '_' + rows.length + 'ch.exp');
}

async function exportSelectedExp() {
    const rows = collectSelectedRows();
    if (!rows.length) { alert('出力するトランジションをチェックしてください'); return; }
    await exportExpRows(rows, 'DESI_MRM');
}

// ===========================================================================
// ② MRM method sets ("A先生セット") — named, reusable measurement methods.
// Each set stores BOTH a reference (transition_id) and a snapshot of the
// channel values, so it survives library edits and always exports to .exp.
// Primary flow: load a project's used transitions (or a saved set) into the
// current selection, then export as-is or after editing; or save the current
// selection as a named set.
// ===========================================================================
async function loadSets() {
    const pw = _readCachedMasterPw();
    if (!pw) return;
    try { mrmSets = (await SupabaseClient.listMrmSets(pw)) || []; }
    catch (e) { console.warn('list_mrm_sets failed', e); mrmSets = []; }
}

// Current checked transitions in library order, with id + snapshot values.
function collectSelectedItems() {
    const items = [];
    for (const c of (library || [])) {
        for (const tr of (c.transitions || [])) {
            if (selectedTransitions.has(tr.id)) {
                items.push({
                    transition_id: tr.id, name: c.name || '',
                    precursor: tr.precursor, product: tr.product, ce: tr.ce, cv: tr.cv,
                });
            }
        }
    }
    return items;
}

// {slug,name} for every project referenced by any transition's usage history.
function projectsFromUsages() {
    const map = new Map();
    for (const c of (library || [])) {
        for (const tr of (c.transitions || [])) {
            for (const u of (tr.usages || [])) {
                if (u.project_slug && !map.has(u.project_slug)) map.set(u.project_slug, u.project_name || u.project_slug);
            }
        }
    }
    return [...map.entries()].map(([slug, name]) => ({ slug, name })).sort((a, b) => a.name.localeCompare(b.name, 'ja'));
}

// Replace the current selection with every transition used in `slug`.
function selectByProject(slug) {
    selectedTransitions.clear();
    let n = 0;
    for (const c of (library || [])) {
        for (const tr of (c.transitions || [])) {
            if ((tr.usages || []).some(u => u.project_slug === slug)) { selectedTransitions.add(tr.id); n++; }
        }
    }
    renderLibrary(); updateExportBar(); renderSelectedPanel();
    return n;
}

// Load a saved set into the selection (matching by transition_id present in the
// current library). Snapshot-only items (transition since deleted) can't be
// checked in the list but stay exportable via the set's direct .exp output.
function applySetToSelection(set) {
    const byId = new Set();
    for (const c of (library || [])) for (const tr of (c.transitions || [])) byId.add(tr.id);
    selectedTransitions.clear();
    let matched = 0, missing = 0;
    for (const it of (set.items || [])) {
        if (it.transition_id && byId.has(it.transition_id)) { selectedTransitions.add(it.transition_id); matched++; }
        else missing++;
    }
    renderLibrary(); updateExportBar(); renderSelectedPanel();
    return { matched, missing };
}

// Snapshot rows for direct .exp export from a set (independent of the library).
function rowsFromSet(set) {
    return (set.items || []).slice().sort((a, b) => (a.position || 0) - (b.position || 0))
        .map(it => ({ name: it.name || '', precursor: it.precursor, product: it.product, cv: it.cv, ce: it.ce }));
}

async function openSetsModal() {
    const pw = _readCachedMasterPw();
    if (!pw) { alert('認証が切れました。再読込してください。'); return; }
    await loadSets();
    const projects = projectsFromUsages();
    const setRows = (mrmSets || []).map(s => {
        const owner = s.owner ? ' <span class="muted">(' + safe(s.owner) + ')</span>' : '';
        const n = (s.items || []).length;
        const sub = n + ' ch'
            + (s.source_project_slug ? ' / from ' + safe(s.source_project_slug) : '')
            + (s.description ? ' / ' + safe(s.description) : '');
        return '<div style="display:flex;align-items:center;gap:6px;border:1px solid #e5e7eb;border-radius:6px;padding:6px 8px;margin-bottom:6px;">'
            + '<div style="flex:1;min-width:0;"><div style="font-weight:600;">' + safe(s.name) + owner + '</div>'
            +   '<div class="muted" style="font-size:11px;">' + sub + '</div></div>'
            + '<button class="btn mini" data-set-load="' + safe(s.id) + '">選択に展開</button>'
            + '<button class="btn mini" data-set-exp="' + safe(s.id) + '" title="このセットを直接 .exp 出力">.exp</button>'
            + '<button class="btn mini danger" data-set-del="' + safe(s.id) + '">削除</button>'
            + '</div>';
    }).join('') || '<p class="muted" style="font-size:12px;">保存済みセットはありません。</p>';
    const projectOpts = ['<option value="">— プロジェクトを選択 —</option>']
        .concat(projects.map(p => '<option value="' + safe(p.slug) + '">' + safe(p.name) + '</option>')).join('');
    const selCount = selectedTransitions.size;
    const html = `
        <h2>MRM メソッドセット</h2>
        <div style="display:flex;flex-direction:column;gap:14px;">
          <section>
            <h3 style="font-size:13px;font-weight:700;margin:0 0 6px;">保存済みセット</h3>
            <div style="max-height:32vh;overflow:auto;">${setRows}</div>
          </section>
          <section style="border-top:1px solid #e5e7eb;padding-top:10px;">
            <h3 style="font-size:13px;font-weight:700;margin:0 0 6px;">プロジェクト履歴から選択</h3>
            <p class="muted" style="font-size:11px;margin:0 0 6px;">選んだプロジェクトで使った全トランジションを「選択中のMRM一覧」に展開します。そのまま .exp 出力、または編集後に出力・セット保存できます。</p>
            <div style="display:flex;gap:6px;">
              <select data-from-project style="flex:1;padding:4px 6px;border:1px solid #cbd5e1;border-radius:4px;">${projectOpts}</select>
              <button type="button" class="btn" data-apply-project>選択に展開</button>
            </div>
          </section>
          <section style="border-top:1px solid #e5e7eb;padding-top:10px;">
            <h3 style="font-size:13px;font-weight:700;margin:0 0 6px;">現在の選択をセットとして保存 <span class="muted" style="font-weight:400;">(${selCount} ch)</span></h3>
            <div style="display:flex;flex-direction:column;gap:6px;">
              <input type="text" data-set-name placeholder="セット名 (例: A先生セット)" style="padding:4px 6px;border:1px solid #cbd5e1;border-radius:4px;">
              <input type="text" data-set-owner placeholder="作成者/担当 (任意, 例: A先生)" style="padding:4px 6px;border:1px solid #cbd5e1;border-radius:4px;">
              <button type="button" class="btn primary" data-save-set ${selCount ? '' : 'disabled'}>選択 ${selCount} ch をセット保存</button>
            </div>
          </section>
          <p class="err" data-err></p>
          <div class="actions"><button type="button" class="btn" data-modal-cancel>閉じる</button></div>
        </div>`;
    const p = openModal(html);
    const card = openModal._card;
    const errEl = card.querySelector('[data-err]');
    const findSet = (id) => (mrmSets || []).find(s => String(s.id) === String(id));

    card.addEventListener('click', async (ev) => {
        const t = ev.target;
        if (!t || !t.getAttribute) return;
        const loadId = t.getAttribute('data-set-load');
        const expId = t.getAttribute('data-set-exp');
        const delId = t.getAttribute('data-set-del');
        if (loadId) {
            const s = findSet(loadId); if (!s) return;
            const r = applySetToSelection(s);
            if (card._close) card._close(null);
            let msg = '「' + s.name + '」を選択に展開しました: ' + r.matched + ' ch';
            if (r.missing) msg += '（ライブラリに無い ' + r.missing + ' ch は除外。[.exp] ボタンで直接出力は可能）';
            alert(msg);
        } else if (expId) {
            const s = findSet(expId); if (!s) return;
            await exportExpRows(rowsFromSet(s), s.name);
        } else if (delId) {
            const s = findSet(delId); if (!s) return;
            if (!confirm('「' + s.name + '」を削除しますか?')) return;
            try { await SupabaseClient.deleteMrmSet(pw, delId); if (card._close) card._close(null); openSetsModal(); }
            catch (e) { reportError(e, 'セット削除'); }
        }
    });
    card.querySelector('[data-apply-project]').addEventListener('click', () => {
        const slug = card.querySelector('[data-from-project]').value;
        if (!slug) { errEl.textContent = 'プロジェクトを選択してください'; return; }
        const n = selectByProject(slug);
        if (card._close) card._close(null);
        alert('プロジェクト「' + slug + '」で使った ' + n + ' ch を選択に展開しました。');
    });
    card.querySelector('[data-save-set]').addEventListener('click', async () => {
        const name = (card.querySelector('[data-set-name]').value || '').trim();
        if (!name) { errEl.textContent = 'セット名は必須です'; return; }
        const owner = (card.querySelector('[data-set-owner]').value || '').trim() || null;
        const items = collectSelectedItems();
        if (!items.length) { errEl.textContent = '選択が空です'; return; }
        try {
            await SupabaseClient.upsertMrmSet(pw, { id: null, name, owner, items });
            if (card._close) card._close(null);
            alert('セット「' + name + '」を保存しました (' + items.length + ' ch)。');
        } catch (e) { reportError(e, 'セット保存'); }
    });
    return p;
}

async function openTemplateModal() {
    const pw = _readCachedMasterPw();
    if (!pw) { alert('認証が切れました。再読込してください。'); return; }
    let current = '';
    try { current = (await SupabaseClient.getExpTemplate(pw)) || ''; } catch (e) { /* ignore */ }
    const html = `
        <h2>出力テンプレート .exp</h2>
        <p style="font-size:11px;color:#475569;margin-bottom:6px;">
          機器固定のテンプレート .exp を1本保存します（出力時に MRM/SIR の可変部だけ差し替え）。
          ファイル選択で読み込むか、本文に貼り付けて保存してください。${current ? '<br><b>保存済み（' + current.length + ' 文字）</b>。再保存で上書きします。' : '<br><b>未保存</b>。'}
        </p>
        <form class="row">
          <label>テンプレ .exp を選択 <input type="file" name="file" accept=".exp,.txt,text/plain"></label>
          <label>テンプレ本文 <textarea name="content" rows="8" style="font-family:ui-monospace,monospace;">${safe(current)}</textarea></label>
          <p class="err" data-err></p>
          <div class="actions">
            <button type="button" class="btn" data-modal-cancel>Cancel</button>
            <button type="submit" class="btn primary" data-modal-ok>保存</button>
          </div>
        </form>`;
    const p = openModal(html);
    const card = openModal._card;
    const fileInp = card.querySelector('[name="file"]');
    const ta = card.querySelector('[name="content"]');
    fileInp.addEventListener('change', async () => {
        const f = fileInp.files && fileInp.files[0];
        if (f) { try { ta.value = await readFileAsText(f); } catch (e) { card.querySelector('[data-err]').textContent = '読込失敗: ' + (e.message || e); } }
    });
    card._collect = () => {
        const content = ta.value || '';
        if (!content.trim()) { card.querySelector('[data-err]').textContent = 'テンプレ本文が空です'; return null; }
        return { content };
    };
    const res = await p;
    if (!res) return;
    try { await SupabaseClient.setExpTemplate(pw, res.content); alert('テンプレートを保存しました'); }
    catch (e) { reportError(e, 'テンプレ保存'); }
}

function bindLibraryEvents() {
    const host = document.getElementById('lib');
    host.addEventListener('click', (ev) => {
        // Quick-select checkbox sits inside <summary>, so a click would also
        // toggle the <details>. Cancel that (which also cancels the native
        // check toggle), then drive selection manually and keep the level-1
        // (summary) and level-2 (detail) checkboxes in sync by shared data-tid.
        const qs = ev.target && ev.target.closest && ev.target.closest('.tr-quick-select');
        if (qs) {
            ev.preventDefault();
            ev.stopPropagation();
            const tid = qs.getAttribute('data-tid');
            const want = !selectedTransitions.has(tid);
            if (want) selectedTransitions.add(tid); else selectedTransitions.delete(tid);
            // preventDefault above cancels the click, which makes the browser
            // restore THIS checkbox to its pre-click (unchecked) state after the
            // handler returns. Re-apply the desired state on the next frame
            // (after that restore, before paint) so the summary checkbox — and
            // the level-2 checkbox if expanded — reflect the selection.
            requestAnimationFrame(() => {
                document.querySelectorAll('#lib .tr-quick-select[data-tid="' + tid + '"], #lib .tr-select[data-tid="' + tid + '"]')
                    .forEach(x => { x.checked = want; });
            });
            updateExportBar();
            renderSelectedPanel();
            return;
        }
        const el = ev.target && ev.target.closest && ev.target.closest('[data-action]');
        if (!el) return;
        const action = el.getAttribute('data-action');
        // Buttons inside <summary> would toggle the <details>; prevent that.
        if (el.closest('summary')) { ev.preventDefault(); }
        ev.stopPropagation();
        const id = el.getAttribute('data-id');
        const tid = el.getAttribute('data-tid');
        switch (action) {
            case 'add-compound': addCompound(); break;
            case 'edit-compound': editCompound(id); break;
            case 'del-compound': delCompound(id); break;
            case 'add-transition': addTransition(id); break;
            case 'edit-transition': editTransition(tid); break;
            case 'del-transition': delTransition(tid); break;
            case 'add-usage': addUsage(tid); break;
            case 'open-usage': openUsageLink(el.getAttribute('data-slug')); break;
        }
    });
    // Transition-selection checkboxes (for .exp export).
    host.addEventListener('change', (ev) => {
        const cb = ev.target;
        if (!cb || !cb.classList || !cb.classList.contains('tr-select')) return;
        const tid = cb.getAttribute('data-tid');
        if (cb.checked) selectedTransitions.add(tid); else selectedTransitions.delete(tid);
        const q = document.querySelector('#lib .tr-quick-select[data-tid="' + tid + '"]');
        if (q) q.checked = cb.checked;   // keep the summary quick-select in sync
        updateExportBar();
        renderSelectedPanel();
    });
}

function bindFilterBar() {
    const bar = document.getElementById('filter-bar');
    bar.addEventListener('click', (ev) => {
        const el = ev.target && ev.target.closest && ev.target.closest('[data-filter]');
        if (!el) return;
        const kind = el.getAttribute('data-filter');
        const val = el.getAttribute('data-val');
        if (kind === 'pol') filterPolarity = val;
        else if (kind === 'tag') { if (selectedTags.has(val)) selectedTags.delete(val); else selectedTags.add(val); }
        else if (kind === 'stype') { if (selectedSampleTypes.has(val)) selectedSampleTypes.delete(val); else selectedSampleTypes.add(val); }
        else if (kind === 'clear') { filterPolarity = ''; selectedTags.clear(); selectedSampleTypes.clear(); }
        renderLibrary();
    });
}

async function init() {
    await requireMasterUnlock();
    document.getElementById('btn-back').addEventListener('click', () => { location.href = 'index.html'; });
    document.getElementById('btn-add-compound').addEventListener('click', () => addCompound());
    (() => {
        const fi = document.getElementById('excel-input');
        const btn = document.getElementById('btn-import-excel');
        if (fi && btn) {
            btn.addEventListener('click', () => fi.click());
            fi.addEventListener('change', async () => {
                const f = fi.files && fi.files[0];
                fi.value = '';   // allow re-selecting the same file later
                if (f) await importMrmFromExcel(f);
            });
        }
    })();
    document.getElementById('btn-reload').addEventListener('click', () => loadLibrary());
    document.getElementById('btn-exp-template').addEventListener('click', () => openTemplateModal());
    document.getElementById('btn-sets').addEventListener('click', () => openSetsModal());
    document.getElementById('btn-exp-export').addEventListener('click', () => exportSelectedExp());
    document.getElementById('btn-exp-clear').addEventListener('click', () => clearSelection());
    const search = document.getElementById('search');
    search.addEventListener('input', () => { searchText = search.value; renderLibrary(); });
    bindLibraryEvents();
    bindFilterBar();
    bindSelectedPanel();
    updateExportBar();
    renderSelectedPanel();
    await loadLibrary();
}

document.addEventListener('DOMContentLoaded', () => { init().catch(e => { console.error(e); alert('init failed: ' + (e.message || e)); }); });
</script>

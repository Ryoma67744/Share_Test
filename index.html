<script>
'use strict';

// ===========================================================================
// IndexedDB helpers — minimal subset of viewer/index.html's ProjectStorage.
// We only need to list / read / delete project rows (no blobs) here.
// ---
// IMPORTANT: keep DB_VERSION in sync with viewer/index.html. Both pages
// open the same `desi-projects` database; bumping the version here and
// not there raises "The requested version (X) is less than the existing
// version (Y)" on whichever page lags behind.
// ===========================================================================
const ProjectStorage = (() => {
    const DB_NAME = 'desi-projects';
    const DB_VERSION = 2;
    let dbPromise = null;
    function open() {
        if (dbPromise) return dbPromise;
        dbPromise = new Promise((resolve, reject) => {
            const req = indexedDB.open(DB_NAME, DB_VERSION);
            req.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains('projects')) db.createObjectStore('projects', { keyPath: 'id' });
                if (!db.objectStoreNames.contains('blobs'))    db.createObjectStore('blobs',    { keyPath: 'id' });
            };
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
        });
        return dbPromise;
    }
    async function listProjects() {
        const db = await open();
        return new Promise((resolve, reject) => {
            const tx = db.transaction('projects', 'readonly');
            const st = tx.objectStore('projects');
            const out = [];
            st.openCursor().onsuccess = (e) => {
                const c = e.target.result;
                if (c) { out.push(c.value); c.continue(); }
                else resolve(out);
            };
            tx.onerror = () => reject(tx.error);
        });
    }
    async function getProject(id) {
        const db = await open();
        return new Promise((resolve, reject) => {
            const tx = db.transaction('projects', 'readonly');
            const req = tx.objectStore('projects').get(id);
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
        });
    }
    async function putProject(project) {
        const db = await open();
        return new Promise((resolve, reject) => {
            const tx = db.transaction('projects', 'readwrite');
            tx.objectStore('projects').put(project);
            tx.oncomplete = () => resolve();
            tx.onerror = () => reject(tx.error);
        });
    }
    async function deleteProject(id) {
        const db = await open();
        return new Promise((resolve, reject) => {
            const tx = db.transaction('projects', 'readwrite');
            tx.objectStore('projects').delete(id);
            tx.oncomplete = () => resolve();
            tx.onerror = () => reject(tx.error);
        });
    }
    return { open, listProjects, getProject, putProject, deleteProject };
})();

// ===========================================================================
// Minimal Supabase client — only the RPCs we need on this page.
// ===========================================================================
const SupabaseClient = (() => {
    let client = null;
    function _client() {
        if (client) return client;
        if (!window.SUPABASE_URL || !window.SUPABASE_ANON_KEY) return null;
        if (typeof supabase === 'undefined' || !supabase.createClient) return null;
        client = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY, { auth: { persistSession: false } });
        return client;
    }
    async function rpc(name, args) {
        const c = _client();
        if (!c) throw new Error('supabase_not_configured');
        const { data, error } = await c.rpc(name, args || {});
        if (error) throw error;
        return data;
    }
    return {
        configured() { return !!_client(); },
        listProjects(ownerPw) { return rpc('list_projects', { _owner_password: ownerPw }); },
        verifyMasterPw(pw) { return rpc('verify_master_pw', { _pw: pw }); },
        changeMasterPw(cur, next) { return rpc('change_master_password', { _current_pw: cur, _new_pw: next }); },
        setProjectPasswordMaster(masterPw, slug, role, pw) { return rpc('set_project_password_master', { _master_pw: masterPw, _slug: slug, _role: role, _pw: pw }); },
        setAllAdminPw(masterPw, newPw) { return rpc('set_all_admin_passwords_master', { _master_pw: masterPw, _new_pw: newPw }); },
        getWorkspaceTree(masterPw) { return rpc('get_workspace_tree', { _master_pw: masterPw }); },
        setWorkspaceTree(masterPw, tree) { return rpc('set_workspace_tree', { _master_pw: masterPw, _tree: tree }); },
        publishFolderShare(masterPw, slug, name, indexDoc, isPublic, password) {
            return rpc('publish_folder_share', { _master_pw: masterPw, _slug: slug, _name: name, _index_doc: indexDoc, _is_public: !!isPublic, _password: password || null });
        },
        deleteFolderShare(masterPw, slug) { return rpc('delete_folder_share', { _master_pw: masterPw, _slug: slug }); },
        deleteProjectDoc(masterPw, slug) { return rpc('delete_project_doc', { _master_pw: masterPw, _slug: slug }); },
        // Mints a short-lived publish-session token. The token is written
        // into publish_sessions and authorises the matching slug's storage
        // writes (insert / update / delete) via the policy at
        // share_locks.sql §4. Used here to wipe orphan storage objects
        // after delete_project_doc removes the projects row.
        requestPublishSession(masterPw, slug) {
            return rpc('request_publish_session', { _master_pw: masterPw, _slug: slug });
        },
        // Direct Storage REST DELETE so we can attach the x-publish-token
        // header (supabase-js's storage.remove() doesn't expose per-call
        // headers). Wrapping fetch lets us reuse the same publish_session
        // token across many path deletions.
        async deleteStorageObject(bucket, path, publishToken) {
            if (!window.SUPABASE_URL || !window.SUPABASE_ANON_KEY) throw new Error('supabase_not_configured');
            const url = window.SUPABASE_URL.replace(/\/+$/, '') + '/storage/v1/object/'
                      + encodeURIComponent(bucket) + '/' + path.split('/').map(encodeURIComponent).join('/');
            const headers = {
                'Authorization': 'Bearer ' + window.SUPABASE_ANON_KEY,
                'apikey': window.SUPABASE_ANON_KEY,
            };
            if (publishToken) headers['x-publish-token'] = publishToken;
            const resp = await fetch(url, { method: 'DELETE', headers });
            if (!resp.ok && resp.status !== 404) {
                const body = await resp.text().catch(() => '');
                throw new Error('storage delete failed: HTTP ' + resp.status + ' ' + body);
            }
        },
    };
})();

// ===========================================================================
// Master-mode gate. Hides the management UI until the user enters the master
// password. Authenticates online via verify_master_pw (bcrypt in
// master_credentials); there is no offline fallback, so Supabase must be
// reachable to unlock. Unlocked state is cached in sessionStorage for 12 h so
// the user only types the password once per tab. Rotate the password in-app
// via the "パスワード変更" button (change_master_password).
//
// SECURITY NOTE: this is a shoulder-surf-level gate, not real security.
// Anyone with DevTools access can read IndexedDB directly or rewrite the
// sessionStorage flag. The real protection for shared data lives in
// Supabase (bcrypt admin password). See supabase/README.md.
// ===========================================================================
const MASTER_UNLOCK_KEY = 'desi:masterUnlocked';
const MASTER_UNLOCK_TTL_MS = 12 * 60 * 60 * 1000;
// Master unlock is verified online only (verify_master_pw / bcrypt in
// master_credentials). The previous hardcoded SHA-256 offline fallback was
// removed so a rotated password (change_master_password) can't be bypassed by
// a stale client-side hash — Supabase connectivity is required to unlock.

function isMasterUnlocked() {
    try {
        const raw = sessionStorage.getItem(MASTER_UNLOCK_KEY);
        if (!raw) return false;
        const p = JSON.parse(raw);
        return !!(p && p.expiresAt && Date.now() < p.expiresAt);
    } catch (e) { return false; }
}

function markMasterUnlocked(pw) {
    try {
        sessionStorage.setItem(MASTER_UNLOCK_KEY, JSON.stringify({
            unlockedAt: Date.now(),
            expiresAt: Date.now() + MASTER_UNLOCK_TTL_MS,
        }));
    } catch (e) {}
    // Phase 1: cache the master pw so Publish can mint a publish-session
    // token without re-prompting. Same TTL as the unlock flag.
    if (pw) {
        try {
            sessionStorage.setItem('desi:masterPw', JSON.stringify({
                pw,
                expiresAt: Date.now() + MASTER_UNLOCK_TTL_MS,
            }));
        } catch (e) {}
    }
}

async function tryServerUnlock(pw) {
    if (!SupabaseClient.configured()) return { ok: false, transient: true };
    // Authenticate ONLY against master_credentials (the single global
    // master pw). The earlier draft of this gate called list_projects(pw),
    // which checks per-project admin passwords — that meant every old
    // admin pw of every previously-published project still let someone
    // in, including legacy values like "MSIadomine". verify_master_pw is
    // the single-row check we actually want.
    try {
        const ok = await SupabaseClient.verifyMasterPw(pw);
        if (ok === true) return { ok: true };
        return { ok: false, transient: false };
    } catch (e) {
        // Network / 5xx / timeout. There is no offline fallback anymore, so
        // this surfaces as a "can't reach server" message rather than a wrong
        // password.
        console.warn('verify_master_pw failed (no offline fallback):', e);
        return { ok: false, transient: true };
    }
}

function openMasterUnlockModal() {
    const html = `
        <h2>パスワードを入力してください</h2>
        <p style="font-size:12px;color:#475569;margin-top:4px;">
          DESI Data Share の管理画面に入るには admin password が必要です。
        </p>
        <form class="row">
          <label>Password
            <input type="password" name="pw" autocomplete="current-password" required>
          </label>
          <p class="err" data-err></p>
          <div class="actions">
            <button type="submit" class="btn primary" data-modal-ok>Unlock</button>
          </div>
        </form>`;
    return new Promise((resolve) => {
        const host = document.getElementById('modal-host');
        const back = document.createElement('div');
        back.className = 'modal-backdrop';
        const card = document.createElement('div');
        card.className = 'modal-card';
        card.innerHTML = html;
        back.appendChild(card);
        host.appendChild(back);
        // Block backdrop clicks so the user can't dismiss the gate.
        back.addEventListener('click', (e) => { if (e.target === back) e.stopPropagation(); });
        const errEl = card.querySelector('[data-err]');
        const submit = card.querySelector('[data-modal-ok]');
        const inp = card.querySelector('[name="pw"]');
        setTimeout(() => inp.focus(), 30);
        const tryUnlock = async () => {
            const pw = (inp.value || '').trim();
            if (!pw) { errEl.textContent = 'パスワードを入力してください'; return; }
            submit.disabled = true; submit.textContent = '確認中…';
            errEl.textContent = '';
            const server = await tryServerUnlock(pw);
            submit.disabled = false; submit.textContent = 'Unlock';
            if (server.ok) {
                markMasterUnlocked(pw);
                back.remove();
                resolve(true);
            } else if (server.transient) {
                errEl.textContent = 'サーバに接続できません。ネットワーク接続を確認してください';
            } else {
                errEl.textContent = 'パスワードが違います';
                inp.select();
            }
        };
        card.querySelector('form').addEventListener('submit', (e) => { e.preventDefault(); tryUnlock(); });
    });
}

// In-app master-password rotation. Verifies the current password server-side
// (change_master_password → _verify_master_pw), then updates the single
// master_credentials row. On success we refresh the cached master pw so
// already-open gated flows (publish, tree, delete) keep working without a
// re-prompt. Requires Supabase connectivity — there is no offline path.
// Unified password-change modal opened from the header. Two targets:
//  - app: the password to ENTER the app / project list = master password
//          (change_master_password, needs the current pw).
//  - listfetch: the "サーバから一覧取得" password = per-project admin, changed
//          in BULK across every project to one uniform value
//          (set_all_admin_passwords_master, authorised by the cached master pw).
// The per-project 🔑 button and viewer passwords are intentionally left alone.
function openPasswordChangeModal() {
    const html = `
        <h2>パスワードの変更</h2>
        <form class="row">
          <label>変更する対象
            <select name="target">
              <option value="app">アプリ（プロジェクト一覧）に入るパスワード</option>
              <option value="listfetch">サーバから一覧取得のパスワード（全プロジェクト共通）</option>
            </select>
          </label>
          <p style="font-size:12px;color:#475569;margin-top:-2px;" data-hint></p>
          <div data-group="app">
            <label>現在のパスワード
              <input type="password" name="cur" autocomplete="current-password">
            </label>
          </div>
          <label>新しいパスワード
            <input type="password" name="next" autocomplete="new-password" required>
          </label>
          <label>新しいパスワード (確認)
            <input type="password" name="next2" autocomplete="new-password" required>
          </label>
          <p class="err" data-err></p>
          <div class="actions">
            <button type="button" class="btn" data-modal-cancel>キャンセル</button>
            <button type="submit" class="btn primary" data-modal-ok>変更する</button>
          </div>
        </form>`;
    return new Promise((resolve) => {
        const host = document.getElementById('modal-host');
        const back = document.createElement('div');
        back.className = 'modal-backdrop';
        const card = document.createElement('div');
        card.className = 'modal-card';
        card.innerHTML = html;
        back.appendChild(card);
        host.appendChild(back);
        const errEl = card.querySelector('[data-err]');
        const submit = card.querySelector('[data-modal-ok]');
        const targetEl = card.querySelector('[name="target"]');
        const appGroup = card.querySelector('[data-group="app"]');
        const hintEl = card.querySelector('[data-hint]');
        const curEl = card.querySelector('[name="cur"]');
        const nextEl = card.querySelector('[name="next"]');
        const next2El = card.querySelector('[name="next2"]');
        const close = (v) => { back.remove(); resolve(v); };
        card.querySelector('[data-modal-cancel]').addEventListener('click', () => close(false));
        back.addEventListener('click', (e) => { if (e.target === back) close(false); });
        const syncTarget = () => {
            errEl.textContent = ''; errEl.style.color = '';
            if (targetEl.value === 'app') {
                appGroup.style.display = '';
                curEl.required = true;
                hintEl.textContent = '現在のパスワードで認証してから、新しいパスワード (8 文字以上) を設定します。全プロジェクト共通の「アプリ入場」パスワードが更新されます。';
            } else {
                appGroup.style.display = 'none';
                curEl.required = false;
                hintEl.textContent = 'マスターパスワードで認可し、全プロジェクトの「サーバから一覧取得」用パスワード (admin, 8 文字以上) を一括で新しい値に統一します。';
            }
        };
        targetEl.addEventListener('change', syncTarget);
        syncTarget();
        setTimeout(() => curEl.focus(), 30);
        const doChange = async () => {
            errEl.style.color = '';
            const target = targetEl.value;
            const next = (nextEl.value || '').trim();
            const next2 = (next2El.value || '').trim();
            if (!next) { errEl.textContent = '新しいパスワードを入力してください'; return; }
            if (next !== next2) { errEl.textContent = '新しいパスワード (確認) が一致しません'; return; }
            if (!SupabaseClient.configured()) { errEl.textContent = 'Supabase が未設定のため変更できません'; return; }

            if (target === 'app') {
                const cur = (curEl.value || '').trim();
                if (!cur) { errEl.textContent = '現在のパスワードを入力してください'; return; }
                if (next.length < 8) { errEl.textContent = '新しいパスワードは 8 文字以上にしてください'; return; }
                if (next === cur) { errEl.textContent = '新しいパスワードが現在と同じです'; return; }
                submit.disabled = true; submit.textContent = '変更中…'; errEl.textContent = '';
                try {
                    await SupabaseClient.changeMasterPw(cur, next);
                    markMasterUnlocked(next);   // keep the unlocked session valid
                    errEl.style.color = '#16a34a';
                    errEl.textContent = 'アプリ入場パスワードを変更しました';
                    setTimeout(() => close(true), 900);
                } catch (e) {
                    submit.disabled = false; submit.textContent = '変更する';
                    const code = e && e.code, msg = (e && e.message) || '';
                    if (code === '28P01' || /invalid current/i.test(msg)) { errEl.textContent = '現在のパスワードが違います'; curEl.select(); }
                    else if (/at least 8|8 characters/i.test(msg)) errEl.textContent = '新しいパスワードは 8 文字以上にしてください';
                    else { console.warn('change_master_password failed:', e); errEl.textContent = 'サーバに接続できませんでした (ネットワークを確認してください)'; }
                }
                return;
            }

            // target === 'listfetch' — bulk admin password across all projects
            if (next.length < 8) { errEl.textContent = '新しいパスワードは 8 文字以上にしてください'; return; }
            // High blast radius: this rewrites EVERY project's admin credential
            // at once. Require an explicit confirmation.
            if (!confirm('全プロジェクトの「サーバから一覧取得」用パスワード(admin)を一括で変更します。\nこれ以降、他のPC/セッションでの一覧取得と master 取り込みには新しいパスワードが必要になります。\n続けますか?')) {
                return;
            }
            let masterPw = readCachedMasterPw();
            if (!masterPw) {

// Master-gated per-project password change (viewer / admin). Reuses the cached
// master pw from the unlock gate; the RPC (set_project_password_master) verifies
// it server-side before writing project_credentials. No re-publish needed.
function openChangeProjectPwModal(slug, name) {
    const esc = (s) => String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;');

            if (!SupabaseClient.configured()) { errEl.textContent = 'Supabase が未設定のため変更できません'; return; }
            let masterPw = readCachedMasterPw();

                    errEl.textContent = 'マスターパスワードが違います（再ログインが必要な場合があります）';

}

async function requireMasterUnlock() {
    if (isMasterUnlocked()) return true;
    return openMasterUnlockModal();
}
const OWNER_PW_KEY = 'desi:ownerPw';
function readCachedOwnerPw() {
    try {
        const raw = sessionStorage.getItem(OWNER_PW_KEY);
        if (!raw) return '';
        const p = JSON.parse(raw);
        if (p && p.expiresAt && Date.now() < p.expiresAt) return p.pw || '';
    } catch (e) {}
    return '';
}
function saveCachedOwnerPw(pw) {
    try { sessionStorage.setItem(OWNER_PW_KEY, JSON.stringify({ pw, expiresAt: Date.now() + 12*60*60*1000 })); } catch (e) {}
}

// ===========================================================================
// ① Workspace tree (folders / sub-project hierarchy). The tree is the master
// password's view of how published (and local) projects are organised. It is
// stored server-side (get/set_workspace_tree, master-pw gated) so every master
// PC sees the same hierarchy; projects themselves are unchanged.
// Tree shape: { version, children:[ node ] }
//   folder  = { type:'folder', id, name, children:[node] }
//   project = { type:'project', slug?, localId? }   (at least one of slug/localId)
// ===========================================================================
let workspaceTree = null;

function _emptyTree() { return { version: 1, children: [] }; }
function _ensureTree() { if (!workspaceTree || !Array.isArray(workspaceTree.children)) workspaceTree = _emptyTree(); }

// The dashboard master gate caches the master pw here on unlock; reuse it for
// the tree RPCs (which are gated by _verify_master_pw, not the per-project pw).
function readCachedMasterPw() {
    try {
        const raw = sessionStorage.getItem('desi:masterPw');
        if (!raw) return '';
        const p = JSON.parse(raw);
        if (p && p.expiresAt && Date.now() < p.expiresAt) return p.pw || '';
    } catch (e) {}
    return '';
}
async function _ensureMasterPwForTree() {
    let pw = readCachedMasterPw();
    if (pw) return pw;
    pw = (prompt('Master password を入力してください') || '').trim();
    if (pw) { try { sessionStorage.setItem('desi:masterPw', JSON.stringify({ pw, expiresAt: Date.now() + 12*3600*1000 })); } catch (e) {} }
    return pw;
}

async function loadWorkspaceTree() {
    if (!SupabaseClient.configured()) { _ensureTree(); return; }
    const pw = readCachedMasterPw();
    if (!pw) { _ensureTree(); return; }   // no master pw yet → flat view
    try {
        const t = await SupabaseClient.getWorkspaceTree(pw);
        workspaceTree = (t && Array.isArray(t.children)) ? t : _emptyTree();
    } catch (e) { console.warn('get_workspace_tree failed', e); _ensureTree(); }
}
async function persistTreeAndRender() {
    await renderList();   // optimistic
    const pw = await _ensureMasterPwForTree();
    if (!pw) { alert('Master password が無いためフォルダ構成を保存できませんでした'); return; }
    try { await SupabaseClient.setWorkspaceTree(pw, workspaceTree); }
    catch (e) { console.warn('set_workspace_tree failed', e); alert('フォルダ構成の保存に失敗しました: ' + ((e && (e.message || e.details)) || e)); }
}

// ---- tree mutation utilities (operate on workspaceTree) ----
function _treeFolderById(id, nodes) {
    nodes = nodes || workspaceTree.children;
    for (const n of nodes) if (n.type === 'folder') {
        if (n.id === id) return n;
        const f = _treeFolderById(id, n.children || []);
        if (f) return f;
    }
    return null;
}
function _treeChildrenOf(folderId) {
    if (!folderId) return workspaceTree.children;
    const f = _treeFolderById(folderId);
    if (f) { f.children = f.children || []; return f.children; }
    return workspaceTree.children;
}
function _treeParentArrayOf(folderId) {
    let found = null;
    const walk = (arr) => {
        for (const n of arr) if (n.type === 'folder') {
            if (n.id === folderId) { found = arr; return true; }
            if (walk(n.children || [])) return true;
        }
        return false;
    };
    walk(workspaceTree.children);
    return found || workspaceTree.children;
}
function _treeRemove(pred) {
    let removed = null;
    const walk = (arr) => {
        for (let i = 0; i < arr.length; i++) {
            if (pred(arr[i])) { removed = arr[i]; arr.splice(i, 1); return true; }
            if (arr[i].type === 'folder' && Array.isArray(arr[i].children) && walk(arr[i].children)) return true;
        }
        return false;
    };
    walk(workspaceTree.children);
    return removed;
}
function _folderDescendantIds(id) {
    const ids = new Set([id]);
    const f = _treeFolderById(id);
    const walk = (nodes) => { for (const n of nodes) if (n.type === 'folder') { ids.add(n.id); walk(n.children || []); } };
    if (f) walk(f.children || []);
    return ids;
}
// Shared folders (those with a shareSlug) whose subtree contains the given
// project (matched by slug or localId). Used to auto-refresh a folder's
// published index snapshot when a child project is renamed, so the listing
// shows the new name at the SAME folder URL.
function _sharedFoldersContainingProject(slug, localId) {
    const out = [];
    const subtreeHasProject = (folder) => {
        let found = false;
        const walk = (nodes) => {
            for (const n of nodes) {
                if (found) return;
                if (n.type === 'project') {
                    if ((slug && n.slug === slug) || (localId && n.localId === localId)) found = true;
                } else if (n.type === 'folder') {
                    walk(n.children || []);
                }
            }
        };
        walk(folder.children || []);
        return found;
    };
    const walkFolders = (nodes) => {
        for (const n of nodes) if (n.type === 'folder') {
            if (n.shareSlug && subtreeHasProject(n)) out.push(n);
            walkFolders(n.children || []);
        }
    };
    walkFolders(workspaceTree.children || []);
    return out;
}
function _flattenFolders() {
    const out = [{ id: null, label: '（ルート）' }];
    const walk = (nodes, prefix) => {
        for (const n of nodes) if (n.type === 'folder') {
            out.push({ id: n.id, label: prefix + n.name });
            walk(n.children || [], prefix + n.name + ' / ');
        }
    };
    walk(workspaceTree.children, '');
    return out;
}
// Modal folder picker. Resolves {id} (id=null = root) or undefined (cancelled).
async function pickFolderModal(excludeIds) {
    _ensureTree();
    const folders = _flattenFolders().filter(f => !(excludeIds && excludeIds.has(f.id)));
    const btns = folders.map(f =>
        '<button type="button" class="btn" data-pick="' + safe(f.id || '') + '" style="display:block;width:100%;text-align:left;margin-bottom:4px;">'
        + safe(f.label) + '</button>').join('');
    const html = '<h2>移動先フォルダを選択</h2><div style="max-height:50vh;overflow:auto;">' + btns
        + '</div><div class="actions" style="margin-top:8px;"><button type="button" class="btn" data-modal-cancel>キャンセル</button></div>';
    const p = openModal(html);
    const card = openModal._card;
    card.querySelectorAll('[data-pick]').forEach(b => b.addEventListener('click', () => {
        if (card._close) card._close({ id: b.getAttribute('data-pick') || null });
    }));
    const v = await p;
    return v == null ? undefined : v;
}

async function treeCreateFolder(parentId) {
    const name = (prompt('フォルダ名', '新しいフォルダ') || '').trim();
    if (!name) return;
    _ensureTree();
    _treeChildrenOf(parentId).push({ type: 'folder', id: 'f_' + Math.random().toString(36).slice(2, 9) + Date.now().toString(36), name, children: [] });
    await persistTreeAndRender();
}
async function treeRenameFolder(id) {
    _ensureTree();
    const f = _treeFolderById(id); if (!f) return;
    const name = (prompt('フォルダ名を変更', f.name) || '').trim();
    if (!name || name === f.name) return;
    f.name = name; await persistTreeAndRender();
}
async function treeDeleteFolder(id) {
    _ensureTree();
    const f = _treeFolderById(id); if (!f) return;
    if (!confirm('フォルダ「' + f.name + '」を削除しますか?\n中のプロジェクト/サブフォルダは1つ上の階層へ移動します（プロジェクト自体は削除されません）。')) return;
    const parentArr = _treeParentArrayOf(id);
    const idx = parentArr.indexOf(f);
    if (idx >= 0) parentArr.splice(idx, 1, ...(f.children || []));
    await persistTreeAndRender();
}
async function treeMoveFolder(id) {
    _ensureTree();
    const dest = await pickFolderModal(_folderDescendantIds(id));
    if (dest === undefined) return;
    const node = _treeRemove(n => n.type === 'folder' && n.id === id);
    if (!node) return;
    _treeChildrenOf(dest.id).push(node);
    await persistTreeAndRender();
}
async function treeMoveProject(slug, localId) {
    _ensureTree();
    const dest = await pickFolderModal();
    if (dest === undefined) return;
    _treeRemove(n => n.type === 'project' && ((slug && n.slug === slug) || (localId && n.localId === localId)));
    const node = { type: 'project' };
    if (slug) node.slug = slug;
    if (localId) node.localId = localId;
    _treeChildrenOf(dest.id).push(node);
    await persistTreeAndRender();
}

// Resolve a tree project node (which may carry only a slug, only a localId, or
// both) to its published share { slug, displayName }, or null when the project
// is not published yet. Built from buildRows() output so that a project created
// inside a folder — stored with only a localId and published later — is matched
// by its localId too, not only by an explicit slug written onto the node. This
// is what makes "share the parent folder" also pick up the sub-folder projects.
function _buildProjectResolver(rows) {
    const slugToName = new Map();
    const localToShare = new Map();
    for (const r of (rows || [])) {
        const slug = (r.local && r.local.shareInfo && r.local.shareInfo.slug) || (r.server && r.server.slug) || '';
        const name = (r.local && r.local.displayName) || (r.server && r.server.display_name) || slug;
        if (slug) slugToName.set(slug, name);
        if (r.local && r.local.id && slug) localToShare.set(r.local.id, { slug, displayName: name });
    }
    return (n) => {
        if (n.slug && slugToName.has(n.slug)) return { slug: n.slug, displayName: slugToName.get(n.slug) };
        if (n.localId && localToShare.has(n.localId)) return localToShare.get(n.localId);
        return null;
    };
}

// ① Phase 2: build the recipient-facing index snapshot for a folder subtree.
// `resolveProject(node)` maps a project node to its published { slug,
// displayName } (or null if unpublished). When `includeSubfolders` is false,
// nested sub-folders are skipped and only this folder's direct published
// projects are listed; otherwise sub-folders are preserved as nesting.
function _buildFolderIndexDoc(folderNode, resolveProject, includeSubfolders) {
    const incSub = includeSubfolders !== false;   // default: include sub-folders
    const conv = (nodes) => {
        const out = [];
        for (const n of (nodes || [])) {
            if (n.type === 'folder') {
                if (incSub) out.push({ type: 'folder', name: n.name, children: conv(n.children || []) });
            } else if (n.type === 'project') {
                const p = resolveProject(n);
                if (p && p.slug) out.push({ type: 'project', slug: p.slug, displayName: p.displayName || p.slug });
            }
        }
        return out;
    };
    return { name: folderNode.name, children: conv(folderNode.children || []) };
}

async function openFolderShareModal(folderId) {
    _ensureTree();
    const node = _treeFolderById(folderId);
    if (!node) return;
    const rows = await buildRows();
    const resolveProject = _buildProjectResolver(rows);
    const includeSub = node.shareIncludeSubfolders !== false;   // default ON, remembered per folder
    // Count this folder's direct + (optionally) nested published projects for
    // the summary line; recomputed live when the sub-folder toggle changes.
    const computeCounts = (incSub) => {
        let total = 0, withSlug = 0;
        (function walk(nodes) {
            for (const n of (nodes || [])) {
                if (n.type === 'folder') { if (incSub) walk(n.children || []); }
                else if (n.type === 'project') { total++; if (resolveProject(n)) withSlug++; }
            }
        })(node.children || []);
        return { total, withSlug };
    };
    const countText = (incSub) => {
        const { total, withSlug } = computeCounts(incSub);
        const excluded = total - withSlug;
        return '配下の<b>公開済み</b>プロジェクト ' + withSlug + ' 件を一覧にします。'
            + (excluded ? '<br><span style="color:#b45309;">未公開の ' + excluded + ' 件は含まれません（先に各プロジェクトを Publish してください）。</span>' : '');
    };
    const cur = node.shareSlug || '';
    const folderUrl = (s) => location.origin + location.pathname.replace(/[^/]+$/, '') + 'viewer/index.html#folder=' + encodeURIComponent(s);
    const defaultSlug = cur || ('folder-' + (((node.name || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 32)) || 'x') + '-' + Math.random().toString(36).slice(2, 6));
    const html = `
        <h2>フォルダを共有: ${safe(node.name)}</h2>
        ${cur ? '<div style="font-size:12px;background:#ecfdf5;border:1px solid #a7f3d0;border-radius:6px;padding:8px;margin-bottom:8px;">共有中（' + (node.shareIsPublic ? 'public' : 'パスワード保護') + '）<br><span style="word-break:break-all;">' + safe(folderUrl(cur)) + '</span><div style="margin-top:6px;display:flex;gap:6px;"><button type="button" class="btn" data-copy>URLコピー</button><button type="button" class="btn danger" data-unshare>共有解除</button></div></div>' : ''}
        <p data-count style="font-size:12px;color:#475569;margin:0 0 8px;"></p>
        <form class="row" style="display:flex;flex-direction:column;gap:8px;">
          <label style="font-size:13px;">共有 slug<br><input type="text" name="slug" value="${safe(defaultSlug)}" style="width:100%;padding:6px 9px;border:1px solid #cbd5e1;border-radius:4px;"></label>
          <label style="font-size:13px;display:flex;align-items:center;gap:6px;"><input type="checkbox" name="includesub" ${includeSub ? 'checked' : ''}> サブフォルダも含めて共有する（オフ＝このフォルダ直下のプロジェクトのみ）</label>
          <label style="font-size:13px;display:flex;align-items:center;gap:6px;"><input type="checkbox" name="pwprotect" ${cur && !node.shareIsPublic ? 'checked' : ''}> パスワードで保護する（オフ＝public）</label>
          <label style="font-size:13px;" data-pw-row><input type="password" name="password" placeholder="フォルダ パスワード (4文字以上)" style="width:100%;padding:6px 9px;border:1px solid #cbd5e1;border-radius:4px;"></label>
          <p class="err" data-err style="color:#b91c1c;font-size:12px;"></p>
          <div class="actions" style="display:flex;gap:6px;justify-content:flex-end;">
            <button type="button" class="btn" data-modal-cancel>閉じる</button>
            <button type="submit" class="btn primary" data-modal-ok>${cur ? '再共有 (更新)' : '共有する'}</button>
          </div>
        </form>`;
    const p = openModal(html);
    const card = openModal._card;
    const errEl = card.querySelector('[data-err]');
    const pwRow = card.querySelector('[data-pw-row]');
    const pwProtect = card.querySelector('[name="pwprotect"]');
    const syncPw = () => { pwRow.style.display = pwProtect.checked ? '' : 'none'; };
    syncPw(); pwProtect.addEventListener('change', syncPw);
    const incSubEl = card.querySelector('[name="includesub"]');
    const countEl = card.querySelector('[data-count]');
    const syncCount = () => { if (countEl) countEl.innerHTML = countText(incSubEl.checked); };
    syncCount(); incSubEl.addEventListener('change', syncCount);
    const copyBtn = card.querySelector('[data-copy]');
    if (copyBtn) copyBtn.addEventListener('click', async () => { try { await navigator.clipboard.writeText(folderUrl(cur)); copyBtn.textContent = 'Copied ✓'; } catch (e) {} });
    const unshareBtn = card.querySelector('[data-unshare]');
    if (unshareBtn) unshareBtn.addEventListener('click', async () => {
        if (!confirm('フォルダ「' + node.name + '」の共有を解除しますか?')) return;
        const pw = await _ensureMasterPwForTree(); if (!pw) return;
        try { await SupabaseClient.deleteFolderShare(pw, cur); } catch (e) { console.warn('delete_folder_share failed', e); }
        delete node.shareSlug; delete node.shareIsPublic;
        if (card._close) card._close(null);
        await persistTreeAndRender();
        alert('共有を解除しました。');
    });
    card._collect = () => {
        const slug = (card.querySelector('[name="slug"]').value || '').trim();
        if (!slug) { errEl.textContent = 'slug は必須です'; return null; }
        const isPublic = !pwProtect.checked;
        const password = (card.querySelector('[name="password"]').value || '').trim();
        if (!isPublic && password.length < 4) { errEl.textContent = 'パスワードは4文字以上'; return null; }
        return { slug, isPublic, password, includeSubfolders: incSubEl.checked };
    };
    const res = await p;
    if (!res) return;
    const pw = await _ensureMasterPwForTree();
    if (!pw) { alert('Master password が必要です'); return; }
    const indexDoc = _buildFolderIndexDoc(node, resolveProject, res.includeSubfolders);
    try {
        await SupabaseClient.publishFolderShare(pw, res.slug, node.name, indexDoc, res.isPublic, res.isPublic ? null : res.password);
        node.shareSlug = res.slug; node.shareIsPublic = res.isPublic; node.shareIncludeSubfolders = res.includeSubfolders;
        await persistTreeAndRender();
        const url = folderUrl(res.slug);
        try { await navigator.clipboard.writeText(url); } catch (e) {}
        alert('共有しました（URL をコピーしました）:\n' + url);
    } catch (e) {
        const msg = String((e && (e.message || e.details)) || '');
        if (/unauthorized|28000/i.test(msg)) alert('Master password が違います');
        else alert('共有に失敗しました: ' + msg);
    }
}

// Folder open/closed UI state — in-memory only (no persistence): folders always
// start collapsed on every page load. Holds the set of EXPANDED folder IDs; a
// folder not in the set is collapsed. Survives re-renders within the same page
// session, resets on reload.
const _openFolders = new Set();

// ===========================================================================
// Modal helpers (similar to viewer/index.html's openModal but self-contained)
// ===========================================================================
function openModal(html) {
    return new Promise((resolve) => {
        const host = document.getElementById('modal-host');
        const back = document.createElement('div');
        back.className = 'modal-backdrop';
        const card = document.createElement('div');
        card.className = 'modal-card';
        card.innerHTML = html;
        back.appendChild(card);
        host.appendChild(back);
        const close = (val) => { back.remove(); resolve(val); };
        card.querySelectorAll('[data-modal-cancel]').forEach(b => b.addEventListener('click', () => close(null)));
        back.addEventListener('click', (e) => { if (e.target === back) close(null); });
        card._close = close; card._back = back;
        const submit = card.querySelector('[data-modal-ok]');
        if (submit) submit.addEventListener('click', () => {
            const result = card._collect ? card._collect() : true;
            if (result === false || result == null) return;
            close(result);
        });
        const form = card.querySelector('form');
        if (form) form.addEventListener('submit', (e) => { e.preventDefault(); if (submit) submit.click(); });
        const focusEl = card.querySelector('input, select, textarea');
        if (focusEl) setTimeout(() => focusEl.focus(), 30);
        openModal._card = card;
    });
}

const safe = (s) => String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');

let serverRowsCache = null;

function uid(prefix) { return prefix + '_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }

function ensureMemoShape(m) {
    m = m || {};
    return {
        sample: m.sample || '',
        sampleTypes: Array.isArray(m.sampleTypes) ? m.sampleTypes : [],
        experimentDate: m.experimentDate || '',
        machine: m.machine || 'DESI',
        googleKeep: m.googleKeep || '',
        freeNote: m.freeNote || '',
        matrix: m.matrix || '',
        derivatization: m.derivatization || '',
    };
}

// Parse a free-text multi-value field (sample types / tags): split on comma,
// Japanese comma, or whitespace; trim; dedupe; drop empties.
function parseList(s) {
    const out = [];
    for (const raw of String(s || '').split(/[,、\s]+/)) {
        const t = raw.trim();
        if (t && !out.includes(t)) out.push(t);
    }
    return out;
}

async function fetchServerProjectList(forcePrompt) {
    if (!SupabaseClient.configured()) return null;
    let pw = forcePrompt ? '' : readCachedOwnerPw();
    if (!pw) {
        pw = (prompt('サーバから一覧取得: admin password を入力してください') || '').trim();
        if (!pw) return null;
    }
    try {
        const rows = await SupabaseClient.listProjects(pw);
        const list = Array.isArray(rows) ? rows : [];
        if (list.length === 0) {
            // A wrong (but >=4-char) admin pw is NOT a server error — it just
            // matches 0 projects. So give feedback on an explicit refresh, and
            // do NOT cache a pw that returned nothing (would keep the silent
            // auto-pull empty forever).
            if (forcePrompt) {
                alert('サーバから 0 件でした。admin パスワードが違うか、まだ Publish 済みプロジェクトがありません。\n(パスワードは 4 文字以上・正しい値かご確認ください)');
            }
            return list;
        }
        saveCachedOwnerPw(pw);
        return list;
    } catch (e) {
        console.warn('list_projects failed', e);
        alert('サーバ一覧の取得に失敗しました (パスワード違い?)');
        return null;
    }
}

async function buildRows() {
    const local = await ProjectStorage.listProjects();
    const localBySlug = new Map();
    const localOnly = [];
    for (const lp of local) {
        const slug = lp.shareInfo && lp.shareInfo.slug;
        if (slug) localBySlug.set(slug, lp);
        else localOnly.push(lp);
    }
    const rows = [];
    for (const lp of localOnly) rows.push({ kind: 'local-only', local: lp });
    for (const lp of localBySlug.values()) rows.push({ kind: 'local+server-maybe', local: lp });
    if (Array.isArray(serverRowsCache)) {
        for (const sp of serverRowsCache) {
            if (localBySlug.has(sp.slug)) {
                const r = rows.find(x => x.local && x.local.shareInfo && x.local.shareInfo.slug === sp.slug);
                if (r) { r.kind = 'local+server'; r.server = sp; }
            } else {
                // Self-heal legacy/orphaned duplicates: if EXACTLY ONE slug-less
                // local shares this server row's display name, adopt the slug
                // onto it (write back to IDB) so the manager shows a single
                // "Local + Server" row instead of "Local" + "Server only".
                // Ambiguous (0 or >1 same-name) matches are left as server-only.
                const nm = String(sp.display_name || '').trim().toLowerCase();
                const cands = nm ? localOnly.filter(lp => String(lp.displayName || '').trim().toLowerCase() === nm) : [];
                if (cands.length === 1) {
                    const lp = cands[0];
                    const prev = lp.shareInfo || {};
                    lp.shareInfo = Object.assign({}, prev, {
                        slug: sp.slug,
                        url: prev.url || new URL('viewer/index.html#share=' + encodeURIComponent(sp.slug), location.href).href,
                    });
                    try { await ProjectStorage.putProject(lp); } catch (e) { console.warn('reconcile putProject failed', e); }
                    localBySlug.set(sp.slug, lp);
                    const row = rows.find(x => x.kind === 'local-only' && x.local === lp);
                    if (row) { row.kind = 'local+server'; row.server = sp; }
                    else rows.push({ kind: 'local+server', local: lp, server: sp });
                    const idx = localOnly.indexOf(lp);
                    if (idx >= 0) localOnly.splice(idx, 1);
                } else {
                    rows.push({ kind: 'server-only', server: sp });
                }
            }
        }
    }
    rows.sort((a, b) => {
        const ta = (a.local && a.local.createdAt) || (a.server && (a.server.updated_at || a.server.created_at)) || '';
        const tb = (b.local && b.local.createdAt) || (b.server && (b.server.updated_at || b.server.created_at)) || '';
        return tb.localeCompare(ta);
    });
    return rows;
}

    const matrix = (machine !== 'DESI' && memo.matrix) ? memo.matrix : '';
    const note = (memo.freeNote || '').slice(0, 120);
    const gk = memo.googleKeep || '';

    const url = (r.local && r.local.shareInfo && r.local.shareInfo.url) || '';

              <div class="font-semibold truncate">${safe(name)}</div>
              ${badge}
            </div>

              ${r.local
                  ? '<button type="button" class="btn primary" data-action="open-local">Open</button>'
                  : '<button type="button" class="btn primary" data-action="open-server" title="サーバから取り込んで master mode で開きます (admin password 要)">Open (master)</button>'}
              ${(!r.local && slug) ? '<button type="button" class="btn" data-action="open-share" title="閲覧専用 share view で開きます">Share view</button>' : ''}
              ${url ? '<button type="button" class="btn" data-action="copy-url">Copy URL</button>' : (r.local ? '<button type="button" class="btn" disabled title="Publish to share してから URL を取得してください">URL なし</button>' : '')}
              ${r.local ? '<button type="button" class="btn danger" data-action="delete-local">Delete</button>' : ''}
              ${(!r.local && slug) ? '<button type="button" class="btn danger" data-action="delete-server" title="サーバから完全に削除 (master password 要)">Delete</button>' : ''}
              ${slug ? '<button type="button" class="btn" data-action="change-pw" title="viewer / admin パスワードを変更 (master password 要)">🔑 パスワード</button>' : ''}
              <button type="button" class="btn" data-action="rename" title="プロジェクト名を変更">改名</button>
              <button type="button" class="btn" data-action="move" title="フォルダへ移動 (サブプロジェクト階層)">📁 移動</button>
            </div>
          </div>
          <div class="text-xs text-gray-600 mt-2">
            実験日: ${safe(date)} ・ 装置: ${safe(machine)}${matrix ? ' / Matrix: ' + safe(matrix) : ''}${stypes.length ? ' ・ サンプル種: ' + safe(stypes.join(', ')) : ''}
            ${gk ? ' ・ <a class="text-blue-600 hover:underline" href="' + safe(gk) + '" target="_blank" rel="noopener">Google Keep ↗</a>' : ''}
          </div>
          ${note ? '<div class="text-xs text-gray-500 mt-1 whitespace-pre-line">' + safe(note) + '</div>' : ''}

}

async function renderList() {
    const list = document.getElementById('list');
    const rows = await buildRows();
    _ensureTree();
    if (!rows.length && !(workspaceTree.children && workspaceTree.children.length)) {
        list.innerHTML = `
            <div class="card p-6 text-center text-sm text-gray-500">
              プロジェクトがまだありません。<br>「+ 新規プロジェクト」で作成するか、「サーバから一覧取得」で過去のプロジェクトを呼び出してください。
            </div>`;
        return;
    }
    // ① Index rows for placement, then render the folder tree with projects
    // inside their folders and any unplaced project at the root.
    const bySlug = new Map(), byLocal = new Map();
    const rkey = (r) => {
        const s = (r.local && r.local.shareInfo && r.local.shareInfo.slug) || (r.server && r.server.slug) || '';
        return s ? ('s:' + s) : ('l:' + (r.local ? r.local.id : ''));
    };
    for (const r of rows) {
        const s = (r.local && r.local.shareInfo && r.local.shareInfo.slug) || (r.server && r.server.slug) || '';
        const lid = r.local ? r.local.id : '';
        if (s) bySlug.set(s, r);
        if (lid) byLocal.set(lid, r);
    }
    const placed = new Set();
    const rowForNode = (n) => {
        if (n.slug && bySlug.has(n.slug)) return bySlug.get(n.slug);
        if (n.localId && byLocal.has(n.localId)) return byLocal.get(n.localId);
        return null;
    };
    // ② Experiment-date ordering (display only; the saved tree/placement is
    // untouched). Within each level: newest 実験日 first; a folder sorts by the
    // newest experiment date it contains, so 日時 > サブフォルダー. Items with
    // no experiment date sink to the bottom.
    const rowExpDate = (r) => {
        if (!r) return '';
        const memo = (r.local && r.local.memo) || (r.server && r.server.meta && r.server.meta.memo) || {};
        return memo.experimentDate || '';
    };
    const nodeDate = (n) => {
        if (n.type === 'project') return rowExpDate(rowForNode(n));
        let best = '';
        for (const c of (n.children || [])) { const d = nodeDate(c); if (d > best) best = d; }
        return best;
    };
    const byDateDesc = (da, db) => {
        if (da === db) return 0;
        if (!da) return 1;
        if (!db) return -1;
        return db.localeCompare(da);
    };
    const sortNodesByDate = (nodes) => (nodes || []).slice().sort((a, b) => byDateDesc(nodeDate(a), nodeDate(b)));
    const folderHead = (n, depth) => {
        const isCol = !_openFolders.has(n.id);
        return '<div class="folder-head" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin:' + (depth ? '6px 0 2px' : '12px 0 2px') + ';">'
            + '<button class="btn" style="padding:0 7px;" data-folder-toggle="' + safe(n.id) + '" title="開閉">' + (isCol ? '▶' : '▼') + '</button>'
            + '<span style="font-weight:700;">📁 ' + safe(n.name) + '</span>'
            + '<button class="btn" style="font-size:11px;padding:2px 6px;" data-folder-add-project="' + safe(n.id) + '" title="このフォルダに新規プロジェクト">＋プロジェクト</button>'
            + '<button class="btn" style="font-size:11px;padding:2px 6px;" data-folder-add="' + safe(n.id) + '" title="サブフォルダ追加">＋サブ</button>'
            + '<button class="btn" style="font-size:11px;padding:2px 6px;" data-folder-rename="' + safe(n.id) + '" title="名前変更">改名</button>'
            + '<button class="btn" style="font-size:11px;padding:2px 6px;" data-folder-move="' + safe(n.id) + '" title="このフォルダを移動">移動</button>'
            + '<button class="btn danger" style="font-size:11px;padding:2px 6px;" data-folder-del="' + safe(n.id) + '" title="削除">削除</button>'
            + '<button class="btn" style="font-size:11px;padding:2px 6px;' + (n.shareSlug ? 'background:#ecfdf5;border-color:#a7f3d0;' : '') + '" data-folder-share="' + safe(n.id) + '" title="このフォルダを共有 (受け手向けインデックス)">' + (n.shareSlug ? '共有中' : '共有') + '</button>'
            + '</div>';
    };
    const renderNodes = (nodes, depth) => {
        let html = '';
        for (const n of sortNodesByDate(nodes)) {
            if (n.type === 'folder') {
                const isCol = !_openFolders.has(n.id);
                const inner = renderNodes(n.children || [], depth + 1);
                html += folderHead(n, depth)
                    + '<div data-folder-body="' + safe(n.id) + '" class="space-y-2" style="margin-left:18px;border-left:2px solid #e5e7eb;padding-left:10px;' + (isCol ? 'display:none;' : '') + '">'
                    +   (inner || '<div class="text-xs text-gray-400 px-1 py-1">（空のフォルダ）</div>')
                    + '</div>';
            } else if (n.type === 'project') {
                const r = rowForNode(n);
                if (r) { placed.add(rkey(r)); html += rowHtml(r); }
            }
        }
        return html;
    };
    const treeHtml = renderNodes(workspaceTree.children, 0);
    const unplacedHtml = rows.filter(r => !placed.has(rkey(r)))
        .slice().sort((a, b) => byDateDesc(rowExpDate(a), rowExpDate(b)))
        .map(rowHtml).join('');
    list.innerHTML = treeHtml + unplacedHtml;

    // ---- folder controls ----
    const esc = (s) => (window.CSS && CSS.escape) ? CSS.escape(s) : s;
    list.querySelectorAll('[data-folder-toggle]').forEach(btn => btn.addEventListener('click', () => {
        const id = btn.getAttribute('data-folder-toggle');
        const body = list.querySelector('[data-folder-body="' + esc(id) + '"]');
        if (_openFolders.has(id)) { _openFolders.delete(id); if (body) body.style.display = 'none'; btn.textContent = '▶'; }
        else { _openFolders.add(id); if (body) body.style.display = ''; btn.textContent = '▼'; }
    }));
    list.querySelectorAll('[data-folder-add]').forEach(b => b.addEventListener('click', () => treeCreateFolder(b.getAttribute('data-folder-add'))));
    list.querySelectorAll('[data-folder-add-project]').forEach(b => b.addEventListener('click', async () => {
        const folderId = b.getAttribute('data-folder-add-project');
        const data = await openNewProjectFormModal();
        if (!data) return;
        const project = await createLocalProjectFromForm(data);
        _ensureTree();
        _treeChildrenOf(folderId).push({ type: 'project', localId: project.id });
        await persistTreeAndRender();          // save folder placement before leaving
        location.href = 'viewer/index.html?project=' + encodeURIComponent(project.id);
    }));
    list.querySelectorAll('[data-folder-rename]').forEach(b => b.addEventListener('click', () => treeRenameFolder(b.getAttribute('data-folder-rename'))));
    list.querySelectorAll('[data-folder-move]').forEach(b => b.addEventListener('click', () => treeMoveFolder(b.getAttribute('data-folder-move'))));
    list.querySelectorAll('[data-folder-del]').forEach(b => b.addEventListener('click', () => treeDeleteFolder(b.getAttribute('data-folder-del'))));
    list.querySelectorAll('[data-folder-share]').forEach(b => b.addEventListener('click', () => openFolderShareModal(b.getAttribute('data-folder-share'))));

    // ---- per-row controls ----
    list.querySelectorAll('.proj-row').forEach(row => {
        const localId = row.getAttribute('data-local-id');
        const slug = row.getAttribute('data-slug');
        const url = row.getAttribute('data-url');
        const click = (action, fn) => {
            const btn = row.querySelector(`[data-action="${action}"]`);
            if (btn) btn.addEventListener('click', fn);
        };
        click('move', () => treeMoveProject(slug, localId));
        click('change-pw', () => {
            if (!slug) return;
            const nmEl = row.querySelector('.font-semibold');
            openChangeProjectPwModal(slug, (nmEl && nmEl.textContent) || slug).catch(e => console.error(e));
        });
        click('open-local', () => {
            if (!localId) return;
            location.href = 'viewer/index.html?project=' + encodeURIComponent(localId);
        });
        click('open-server', () => {
            if (!slug) return;
            // Master 取り込み経路: viewer 側で admin pw を聞いて Local IDB に
            // ダウンロード → master mode で開く。share view は別ボタンに分離。
            location.href = 'viewer/index.html?import=' + encodeURIComponent(slug);
        });
        click('open-share', () => {
            if (!slug) return;
            location.href = 'viewer/index.html#share=' + encodeURIComponent(slug);
        });
        click('copy-url', async () => {
            if (!url) return;
            try { await navigator.clipboard.writeText(url); }
            catch (e) {
                const ta = document.createElement('textarea');
                ta.value = url; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
            }
            const btn = row.querySelector('[data-action="copy-url"]');
            if (btn) { const o = btn.textContent; btn.textContent = 'Copied ✓'; setTimeout(() => { btn.textContent = o; }, 1200); }
        });
        click('delete-local', async () => {
            if (!localId) return;
            if (!confirm('ローカルからこのプロジェクトを削除しますか? (サーバに publish 済みなら、サーバ側のデータは残ります)')) return;
            await ProjectStorage.deleteProject(localId);
            await renderList();
        });
        click('delete-server', async () => {
            if (!slug) return;
            if (!confirm('"' + slug + '" をサーバから完全に削除します。\n' +
                         'projects / sections / rois / credentials / storage object すべて消去します。\n' +
                         'この操作は元に戻せません。続けますか?')) return;
            // 既存の master pw キャッシュを再利用 (publish フローと共通)
            let masterPw = '';
            try {
                const raw = sessionStorage.getItem('desi:masterPw');
                if (raw) {
                    const p = JSON.parse(raw);
                    if (p && p.expiresAt > Date.now()) masterPw = p.pw || '';
                }
            } catch (e) {}
            if (!masterPw) {
                masterPw = (prompt('Master password を入力してください') || '').trim();
                if (!masterPw) return;
            }
            try {
                // 1. publish_session token を先にミント (storage delete に
                //    必要、share_locks.sql §4 のポリシー)。失敗するなら
                //    master pw が違う可能性大なのでここで弾く。
                let publishToken = null;
                try {
                    const sess = await SupabaseClient.requestPublishSession(masterPw, slug);
                    publishToken = sess && sess.token;
                } catch (e) {
                    const msg = String((e && (e.message || e.details)) || '');
                    if (/unauthorized|28000/i.test(msg)) {
                        alert('Master password が違います');
                        return;
                    }
                    console.warn('publish session mint failed', e);
                }
                // 2. delete_project_doc で DB 行削除 + storage path 一覧取得
                const r = await SupabaseClient.deleteProjectDoc(masterPw, slug);
                if (!r || r.ok !== true) {
                    alert('削除失敗: ' + JSON.stringify(r));
                    return;
                }
                // 3. 各 path を Storage API 経由で削除 (publish-token 経路)
                const paths = Array.isArray(r.paths) ? r.paths : [];
                let deleted = 0, failed = 0;
                for (const p of paths) {
                    try {
                        await SupabaseClient.deleteStorageObject('atlases', p, publishToken);
                        deleted++;
                    } catch (e) {
                        console.warn('storage delete failed for', p, e);
                        failed++;
                    }
                }
                // master pw キャッシュ更新 (12 h)
                try {
                    sessionStorage.setItem('desi:masterPw',
                        JSON.stringify({ pw: masterPw, expiresAt: Date.now() + 12 * 3600 * 1000 }));
                } catch (e) {}
                let msg = '削除しました (DB: ok, storage objects: ' + deleted + ' 件)';
                if (failed) msg += ' / 失敗: ' + failed + ' 件 (orphan blob として残ります)';
                alert(msg);
                await renderList();
            } catch (e) {
                const msg = String((e && (e.message || e.details)) || '');
                if (/unauthorized|28000/i.test(msg)) alert('Master password が違います');
                else alert('削除失敗: ' + msg);
            }
        });
        click('rename', async () => {
            // Local-backed rows (Local / Local + Server): rename the IndexedDB
            // displayName in place — the list updates immediately. The published
            // copy keeps the server display_name until the project is re-published
            // from master mode (publish reads project.displayName). Server-only
            // rows have no local record, so guide the user to import → master →
            // rename → re-publish.
            if (localId) {
                let proj = null;
                try { proj = await ProjectStorage.getProject(localId); } catch (e) {}
                if (!proj) { alert('プロジェクトが見つかりません'); return; }
                const cur = proj.displayName || '';
                const name = (prompt('プロジェクト名を変更', cur) || '').trim();
                if (!name || name === cur) return;
                proj.displayName = name;
                try { await ProjectStorage.putProject(proj); }
                catch (e) { alert('改名に失敗しました: ' + (e && e.message || e)); return; }
                await renderList();
                // Auto-refresh any shared folder whose listing includes this
                // project so its snapshot shows the new name at the SAME folder
                // URL. Public folders re-share with just the master pw; private
                // folders need their password (not stored) — publish_folder_share
                // rejects a null password unless the optional SQL relax is
                // applied, so those are reported for manual re-share.
                let folderMsg = '';
                try {
                    _ensureTree();
                    const shared = _sharedFoldersContainingProject(proj.shareInfo && proj.shareInfo.slug, localId);
                    if (shared.length && SupabaseClient.configured()) {
                        const masterPw = await _ensureMasterPwForTree();
                        if (masterPw) {
                            const rows2 = await buildRows();
                            const resolveProject = _buildProjectResolver(rows2);
                            const failed = [];
                            for (const folder of shared) {
                                try {
                                    const indexDoc = _buildFolderIndexDoc(folder, resolveProject, folder.shareIncludeSubfolders !== false);
                                    await SupabaseClient.publishFolderShare(masterPw, folder.shareSlug, folder.name, indexDoc, folder.shareIsPublic, null);
                                } catch (e) { console.warn('auto re-share folder failed', folder.name, e); failed.push(folder.name); }
                            }
                            folderMsg = failed.length
                                ? '\n\n共有フォルダ「' + failed.join('」「') + '」の一覧名は自動更新できませんでした（パスワード保護のため）。フォルダの「共有」ボタンから再共有してください。'
                                : '\n\n共有フォルダの一覧名も更新しました。';
                        }
                    }
                } catch (e) { console.warn('folder auto re-share skipped', e); }
                if (slug) alert('ローカル名を変更しました。' + folderMsg
                    + '\n\n※ プロジェクト共有ページ自体の表示名は、master で開いて再 Publish すると反映されます。');
            } else if (slug) {
                if (confirm('Server only のプロジェクトはここでは直接改名できません。\n「Open (master)」でローカルに取り込んでから改名 →（必要なら）再 Publish できます。\n今すぐ master mode で開きますか?')) {
                    location.href = 'viewer/index.html?import=' + encodeURIComponent(slug);
                }
            }
        });
    });
}

// ===========================================================================
// Help modal (audience x language). Mirrors viewer/index.html's modal so
// users on the manager page don't have to bounce out to read the docs.
// ===========================================================================
const _helpAudiences = [
    { key: 'manage', labelJa: '管理画面',         labelEn: 'Project mgmt' },
    { key: 'master', labelJa: '共有 (admin)',     labelEn: 'Sharing (admin)' },
    { key: 'viewer', labelJa: '共有 (受け手)',    labelEn: 'Sharing (viewer)' },
];
const _helpGuideSources = {
    'manage:ja': { path: 'USER_GUIDE.manage.md',    title: 'DESI Data Share — プロジェクト管理ガイド' },
    'manage:en': { path: 'USER_GUIDE.manage.en.md', title: 'DESI Data Share — Project Management Guide' },
    'master:ja': { path: 'USER_GUIDE.master.md',    title: 'DESI Data Share — 管理者ガイド (データ共有)' },
    'master:en': { path: 'USER_GUIDE.master.en.md', title: 'DESI Data Share — Admin Guide (Data Sharing)' },
    'viewer:ja': { path: 'USER_GUIDE.md',           title: 'DESI Data Share — 閲覧者ガイド' },
    'viewer:en': { path: 'USER_GUIDE.en.md',        title: "DESI Data Share — Viewer's Guide" },
};
const _helpMarkdownCache = {};

function _readHelpLang() {
    try {
        const v = localStorage.getItem('desi:helpLang');
        if (v === 'ja' || v === 'en') return v;
    } catch (e) {}
    return /^en/i.test(navigator.language || '') ? 'en' : 'ja';
}
function _readHelpAudience(fallback) {
    try {
        const v = localStorage.getItem('desi:helpAudience');
        if (v === 'manage' || v === 'master' || v === 'viewer') return v;
    } catch (e) {}
    return fallback || 'manage';
}

async function openHelpModal(audience, lang) {
    audience = (audience === 'manage' || audience === 'master' || audience === 'viewer')
        ? audience : _readHelpAudience('manage');
    lang = (lang === 'en' || lang === 'ja') ? lang : _readHelpLang();
    try { localStorage.setItem('desi:helpAudience', audience); } catch (e) {}
    try { localStorage.setItem('desi:helpLang', lang); } catch (e) {}
    const cacheKey = audience + ':' + lang;
    const cfg = _helpGuideSources[cacheKey];
    let md = _helpMarkdownCache[cacheKey];
    if (md == null) {
        try {
            const resp = await fetch(cfg.path, { cache: 'no-cache' });
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            md = await resp.text();
            _helpMarkdownCache[cacheKey] = md;
        } catch (e) {
            console.error('Help fetch failed', e);
            const closeLabel = lang === 'en' ? 'Close' : 'Close';
            const errTitle = lang === 'en' ? 'Failed to load help' : 'Help を取得できませんでした';
            const fallbackHtml = `
                <h2>${errTitle}</h2>
                <p style="font-size:12px;color:#475569;">${cfg.path}: ${String(e.message || e)}</p>
                <p style="font-size:12px;color:#475569;"><a href="${cfg.path}" target="_blank" rel="noopener">${cfg.path}</a></p>
                <div class="actions"><button type="button" class="btn primary" data-modal-cancel>${closeLabel}</button></div>`;
            return openModal(fallbackHtml);
        }
    }
    let bodyHtml;
    try {
        const raw = (typeof marked !== 'undefined') ? marked.parse(md) : md;
        bodyHtml = (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(raw) : raw;
    } catch (e) {
        console.error('Markdown render failed', e);
        bodyHtml = '<pre>' + String(md).replace(/&/g, '&amp;').replace(/</g, '&lt;') + '</pre>';
    }
    // GitHub-style slug: lowercase, spaces → '-', then keep only Unicode
    // letters / digits / dash / underscore so common punctuation like
    // '.', '/', ':', '&', '・', '()' (which TOC authors usually drop)
    // doesn't end up in heading ids. \p{L}\p{N} with /u covers Latin
    // plus Japanese kana/kanji and other CJK glyphs.
    const slugifyHelp = (s) => String(s).trim().toLowerCase()
        .replace(/\s+/g, '-')
        .replace(/[^\p{L}\p{N}_-]/gu, '');
    try {
        const tmp = document.createElement('div');
        tmp.innerHTML = bodyHtml;
        tmp.querySelectorAll('h1, h2, h3').forEach(h => {
            if (!h.id) h.id = slugifyHelp(h.textContent || '');
        });
        bodyHtml = tmp.innerHTML;
    } catch (e) {}
    const audTab = (a, active) => {
        const label = lang === 'en' ? a.labelEn : a.labelJa;
        return `<button type="button" data-help-audience="${a.key}" style="padding:3px 10px;border:1px solid #cbd5e1;border-radius:3px;font-size:11px;cursor:pointer;background:${active ? '#0f172a' : '#fff'};color:${active ? '#fff' : '#1e293b'};">${label}</button>`;
    };
    const langBtn = (key, active, label) =>
        `<button type="button" data-help-lang="${key}" style="padding:3px 10px;border:1px solid #cbd5e1;border-radius:3px;font-size:11px;cursor:pointer;background:${active ? '#2563eb' : '#fff'};color:${active ? '#fff' : '#1e293b'};">${label}</button>`;
    const openLabel = lang === 'en' ? 'Open in new tab' : '新しいタブで開く';
    const closeLabel = 'Close';
    const html = `
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;flex-wrap:wrap;">
          <h2 style="margin:0;">${cfg.title}</h2>
          <div style="display:flex;gap:4px;align-items:center;">
            <div style="display:flex;gap:4px;">${_helpAudiences.map(a => audTab(a, audience === a.key)).join('')}</div>
            <div style="width:1px;height:18px;background:#cbd5e1;margin:0 4px;"></div>
            <div style="display:flex;gap:4px;">${langBtn('ja', lang === 'ja', '日本語')}${langBtn('en', lang === 'en', 'English')}</div>
          </div>
        </div>
        <div class="help-body">${bodyHtml}</div>
        <div class="actions" style="position:sticky;bottom:0;background:#fff;padding-top:8px;">
          <a class="btn" href="${cfg.path}" target="_blank" rel="noopener">${openLabel}</a>
          <button type="button" class="btn primary" data-modal-cancel>${closeLabel}</button>
        </div>`;
    const p = openModal(html);
    const card = openModal._card;
    if (card) {
        card.classList.add('help-card');
        card.querySelectorAll('[data-help-lang]').forEach(btn => {
            btn.addEventListener('click', () => {
                const next = btn.getAttribute('data-help-lang');
                if (next === lang) return;
                if (card._close) card._close(null);
                openHelpModal(audience, next).catch(e => console.error(e));
            });
        });
        card.querySelectorAll('[data-help-audience]').forEach(btn => {
            btn.addEventListener('click', () => {
                const next = btn.getAttribute('data-help-audience');
                if (next === audience) return;
                if (card._close) card._close(null);
                openHelpModal(next, lang).catch(e => console.error(e));
            });
        });
        // marked URL-encodes non-ASCII characters in href values, so a TOC
        // link to "#5-プロジェクトを開く削除する" arrives as "#5-%E3%83%97...".
        // The heading ids on the page are raw Unicode, and CSS selectors
        // don't accept ids starting with a digit, so we decode the href and
        // do an id-property lookup instead of querySelector(href).
        const helpBody = card.querySelector('.help-body');
        if (helpBody) {
            helpBody.querySelectorAll('a[href^="#"]').forEach(a => {
                a.addEventListener('click', (ev) => {
                    const hrefAttr = a.getAttribute('href') || '';
                    if (hrefAttr.length < 2) return;
                    let want;
                    try { want = decodeURIComponent(hrefAttr.slice(1)); }
                    catch (e) { want = hrefAttr.slice(1); }
                    let target = Array.from(helpBody.querySelectorAll('[id]'))
                        .find(el => el.id === want) || null;
                    if (!target) {
                        target = Array.from(helpBody.querySelectorAll('h1, h2, h3'))
                            .find(h => slugifyHelp(h.textContent || '') === want) || null;
                    }
                    if (!target) return;
                    ev.preventDefault();
                    target.scrollIntoView({ block: 'start', behavior: 'smooth' });
                });
            });
        }
    }
    return p;
}

async function init() {
    // Gate the entire management UI behind a password. The unlock modal
    // refuses to dismiss until a valid password is entered, so anything
    // below this line only runs once the user is authenticated.
    await requireMasterUnlock();
    document.getElementById('btn-new').addEventListener('click', async () => {
        const data = await openNewProjectFormModal();
        if (!data) return;
        const project = await createLocalProjectFromForm(data);
        // Jump straight into the viewer with the newly-created project.
        location.href = 'viewer/index.html?project=' + encodeURIComponent(project.id);
    });
    document.getElementById('btn-refresh-server').addEventListener('click', async () => {
        const rows = await fetchServerProjectList(true);
        if (rows) {
            serverRowsCache = rows;
            await loadWorkspaceTree();
            await renderList();
        }
    });
    document.getElementById('btn-new-folder').addEventListener('click', () => treeCreateFolder(null));
    document.getElementById('btn-help').addEventListener('click', () => {
        // Native modal so we don't bounce away from the manager. Default
        // audience is 'manage' since this page IS the management screen.
        openHelpModal('manage').catch(e => console.error(e));
    });
    document.getElementById('btn-mrm').addEventListener('click', () => {
        location.href = 'mrm.html';
    });
    document.getElementById('btn-change-master-pw').addEventListener('click', () => {
        openPasswordChangeModal().catch(e => console.error(e));
    });

    await loadWorkspaceTree();
    await renderList();
    // Try a silent server pull if we have a cached owner pw and the
    // bootstrap path didn't already give us rows.
    const cachedPw = readCachedOwnerPw();
    if (!serverRowsCache && cachedPw && SupabaseClient.configured()) {
        try {
            const rows = await SupabaseClient.listProjects(cachedPw);
            if (Array.isArray(rows)) {
                serverRowsCache = rows;
                await loadWorkspaceTree();
                await renderList();
            }
        } catch (e) { /* expired or wrong: silently ignore, user can hit refresh */ }
    }
}

document.addEventListener('DOMContentLoaded', () => { init().catch(e => { console.error(e); alert('init failed: ' + (e.message || e)); }); });
</script>
